<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>數學探索RPG</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1A1A2E;font-family:'Segoe UI',sans-serif;overflow:hidden;touch-action:none}
#game-container{width:100vw;height:100vh;display:block}
#hud{position:fixed;top:0;left:0;right:0;padding:10px 15px;display:flex;gap:12px;z-index:100;pointer-events:none}
.hud-item{display:flex;align-items:center;gap:6px;color:#fff;font-size:14px;font-weight:600}
.hud-bar{width:80px;height:10px;background:#2d2d4a;border-radius:5px;overflow:hidden}
.hud-fill{height:100%;border-radius:5px;transition:width .3s}
#hp-bar{background:#F5222D}
#xp-bar{background:#FAAD14}
#quiz-overlay{display:none;position:fixed;inset:0;background:rgba(26,26,46,.95);z-index:200;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#quiz-card{background:#16213e;border-radius:16px;padding:24px;max-width:500px;width:100%;border:2px solid #4A90D9;box-shadow:0 0 30px rgba(74,144,217,.3)}
#quiz-topic{color:#4A90D9;font-size:13px;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
#quiz-question{margin-bottom:20px;font-size:18px;color:#fff;line-height:1.6;min-height:60px}
#quiz-question .katex{font-size:1.2em}
.quiz-options{display:flex;flex-direction:column;gap:10px}
.quiz-option{background:#1f2d4a;border:2px solid #2d4a6a;border-radius:10px;padding:12px 16px;color:#fff;font-size:15px;cursor:pointer;transition:all .2s;text-align:left}
.quiz-option:hover,.quiz-option:active{border-color:#4A90D9;background:#2d4a6a}
.quiz-option.correct{border-color:#52C41A;background:rgba(82,196,26,.2)}
.quiz-option.wrong{border-color:#F5222D;background:rgba(245,34,45,.2)}
.quiz-option.disabled{pointer-events:none;opacity:.6}
#quiz-feedback{margin-top:16px;text-align:center;font-size:16px;font-weight:700;min-height:24px}
#quiz-feedback.correct{color:#52C41A}
#quiz-feedback.wrong{color:#F5222D}
#quiz-exit{margin-top:16px;background:transparent;border:2px solid #4A90D9;color:#4A90D9;padding:8px 24px;border-radius:8px;cursor:pointer;font-size:14px}
#quiz-exit:hover{background:#4A90D9;color:#fff}
#joystick-zone{display:none;position:fixed;bottom:30px;left:30px;width:120px;height:120px;z-index:150;pointer-events:all}
#joystick-base{width:100%;height:100%;background:rgba(255,255,255,.1);border-radius:50%;border:3px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center}
#joystick-knob{width:50px;height:50px;background:#4A90D9;border-radius:50%;opacity:.8;transition:transform .1s}
#level-up{display:none;position:fixed;inset:0;z-index:300;background:rgba(26,26,46,.9);flex-direction:column;align-items:center;justify-content:center}
.level-up-text{font-size:48px;color:#FAAD14;font-weight:900;text-align:center;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.level-up-sub{font-size:20px;color:#fff;margin-top:10px}
#menu-btn{position:fixed;top:10px;right:10px;z-index:110;background:#4A90D9;border:none;color:#fff;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px}
</style>
</head>
<body>
<div id="game-container"></div>
<div id="hud">
<div class="hud-item"><span style="color:#F5222D">❤</span><div class="hud-bar"><div class="hud-fill" id="hp-bar" style="width:100%"></div></div><span id="hp-text">100</span></div>
<div class="hud-item"><span style="color:#FAAD14">⭐</span><div class="hud-bar"><div class="hud-fill" id="xp-bar" style="width:0%"></div></div><span id="level-text">Lv.1</span></div>
</div>
<button id="menu-btn" onclick="showMenu()">選單</button>
<div id="quiz-overlay">
<div id="quiz-card">
<div id="quiz-topic">代數房</div>
<div id="quiz-question"></div>
<div class="quiz-options" id="quiz-options"></div>
<div id="quiz-feedback"></div>
<button id="quiz-exit" onclick="exitQuiz()">離開</button>
</div>
</div>
<div id="level-up"><div class="level-up-text">⬆️ 升級！</div><div class="level-up-sub" id="level-up-info">等級 2</div></div>
<div id="joystick-zone"><div id="joystick-base"><div id="joystick-knob"></div></div></div>
<div id="menu" style="display:none;position:fixed;inset:0;z-index:400;background:rgba(26,26,46,.95);flex-direction:column;align-items:center;justify-content:center;gap:16px">
<div style="color:#fff;font-size:24px;font-weight:700;margin-bottom:10px">📋 選單</div>
<button onclick="resetGame()" style="background:#F5222D;border:none;color:#fff;padding:12px 32px;border-radius:8px;cursor:pointer;font-size:15px">重新開始</button>
<button onclick="closeMenu()" style="background:#4A90D9;border:none;color:#fff;padding:12px 32px;border-radius:8px;cursor:pointer;font-size:15px">繼續遊戲</button>
</div>
<script>
// ============ SOUND ============
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function playTone(freq,dur,type='square',vol=.15){
  initAudio();
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function sfxCorrect(){playTone(523,.15,'sine',.2);setTimeout(()=>playTone(659,.15,'sine',.2),100);setTimeout(()=>playTone(784,.2,'sine',.2),200)}
function sfxWrong(){playTone(200,.3,'sawtooth',.15)}
function sfxLevelUp(){playTone(440,.1,'sine',.2);setTimeout(()=>playTone(554,.1,'sine',.2),100);setTimeout(()=>playTone(659,.1,'sine',.2),200);setTimeout(()=>playTone(880,.3,'sine',.2),300)}
function sfxStep(){playTone(300,.05,'triangle',.05)}
// ============ QUESTIONS ============
const QUESTIONS=[
{id:'alg01',topic:'代數',difficulty:1,question:'已知 $b = 3 + a^2$，求當 $a = -6$ 時 $b$ 的值',options:{A:'39',B:'-39',C:'33',D:'-33'},answer:'A'},
{id:'alg02',topic:'代數',difficulty:1,question:'以代數式表示 $x$ 的平方與 $y$ 之積',options:{A:'$x^2y$',B:'$x^2+y$',C:'$x^3-y$',D:'$x^3y$'},answer:'A'},
{id:'alg03',topic:'代數',difficulty:1,question:'計算 $\\frac{5}{8} + 0.65$ 的值',options:{A:'1.275',B:'0.775',C:'1.175',D:'0.675'},answer:'A'},
{id:'alg04',topic:'代數',difficulty:1,question:'化簡 $7r - 8 - 4r + 3$',options:{A:'$3r - 5$',B:'$3r - 11$',C:'$11r - 5$',D:'$11r - 11$'},answer:'A'},
{id:'alg05',topic:'代數',difficulty:1,question:'解方程 $5x + 3 = 8$',options:{A:'$x = 1$',B:'$x = 5$',C:'$x = 11$',D:'$x = -1$'},answer:'A'},
{id:'alg06',topic:'代數',difficulty:2,question:'計算 $\\frac{(+6) + (-8)}{(-2)}$ 的值',options:{A:'-8',B:'-4',C:'1',D:'4'},answer:'C'},
{id:'alg07',topic:'代數',difficulty:2,question:'$-11 + 5 - 1$ 的值為',options:{A:'-7',B:'-5',C:'7',D:'-13'},answer:'A'},
{id:'alg08',topic:'代數',difficulty:2,question:'$(+23) - (-19)$ 的值為',options:{A:'-42',B:'42',C:'-4',D:'4'},answer:'B'},
{id:'geo01',topic:'幾何',difficulty:1,question:'已知直角三角形的兩直角邊為 3 和 4，求斜邊',options:{A:'5',B:'6',C:'7',D:'12'},answer:'A'},
{id:'geo02',topic:'幾何',difficulty:1,question:'圓形的半徑為 7，其面積為',options:{A:'$14\\pi$',B:'$49\\pi$',C:'$7\\pi$',D:'$28\\pi$'},answer:'B'},
{id:'geo03',topic:'幾何',difficulty:1,question:'正方形的邊長為 5，周界為',options:{A:'15',B:'20',C:'25',D:'10'},answer:'B'},
{id:'geo04',topic:'幾何',difficulty:2,question:'三角形的內角和為',options:{A:'90°',B:'180°',C:'270°',D:'360°'},answer:'B'},
{id:'geo05',topic:'幾何',difficulty:2,question:'長方形的長為 8，闊為 3，面積為',options:{A:'11',B:'22',C:'24',D:'8'},answer:'C'},
{id:'stat01',topic:'統計',difficulty:1,question:'下列哪個是平均數的公式？',options:{A:'$\\bar{x}=\\frac{\\SUM x}{n}$',B:'$\\bar{x}=\\SUM x \\cdot n$',C:'$\\bar{x}=\\frac{n}{\\SUM x}$',D:'$\\bar{x}=\\SUM x + n$'},answer:'A'},
{id:'stat02',topic:'統計',difficulty:1,question:'數據 2, 4, 6, 8 的平均數為',options:{A:'4',B:'5',C:'6',D:'8'},answer:'B'},
{id:'stat03',topic:'統計',difficulty:2,question:'一組數據 3, 3, 3, 3 的眾數為',options:{A:'0',B:'3',C:'12',D:'無法確定'},answer:'B'},
{id:'stat04',topic:'統計',difficulty:2,question:'數據 1, 2, 3, 4, 5 的中位數為',options:{A:'2',B:'3',C:'4',D:'5'},answer:'B'},
{id:'stat05',topic:'統計',difficulty:1,question:'一副撲克牌有 52 張，抽到紅色的概率為',options:{A:'$\\frac{1}{2}$',B:'$\\frac{1}{4}$',C:'$\\frac{1}{3}$',D:'$\\frac{2}{3}$'},answer:'A'},
];
// ============ GAME STATE ============
const TILE=48;
const MAP_COLS=12;
const MAP_ROWS=9;
let gameState={hp:100,maxHp:100,xp:0,level:1,questionsAnswered:0,correctAnswers:0};
function loadState(){
  const s=localStorage.getItem('mathrpg_v1');
  if(s){const d=JSON.parse(s);gameState={...gameState,...d};
    if(gameState.hp<=0)gameState.hp=gameState.maxHp;
  }
}
function saveState(){localStorage.setItem('mathrpg_v1',JSON.stringify(gameState))}
function addXP(amt){
  gameState.xp+=amt;
  const needed=100*gameState.level;
  if(gameState.xp>=needed){gameState.xp-=needed;gameState.level++;sfxLevelUp();showLevelUp();}
  saveState();updateHUD();
}
function loseHP(amt){
  gameState.hp=Math.max(0,gameState.hp-amt);
  if(gameState.hp<=0){gameState.hp=gameState.maxHp;gameState.xp=Math.max(0,gameState.xp-10);}
  saveState();updateHUD();
}
function updateHUD(){
  document.getElementById('hp-bar').style.width=(gameState.hp/gameState.maxHp*100)+'%';
  document.getElementById('hp-text').textContent=Math.round(gameState.hp);
  document.getElementById('xp-bar').style.width=(gameState.xp/(100*gameState.level)*100)+'%';
  document.getElementById('level-text').textContent='Lv.'+gameState.level;
}
function showLevelUp(){
  document.getElementById('level-up').style.display='flex';
  document.getElementById('level-up-info').textContent='等級 '+gameState.level;
  setTimeout(()=>{document.getElementById('level-up').style.display='none'},2000);
}
function showMenu(){document.getElementById('menu').style.display='flex'}
function closeMenu(){document.getElementById('menu').style.display='none'}
function resetGame(){localStorage.removeItem('mathrpg_v1');location.reload()}
function renderMath(el,tex){
  if(window.katex){try{katex.render(tex,el,{throwOnError:false,displayMode:true});}catch(e){el.textContent=tex;}}
  else{el.textContent=tex;}
}
// ============ PHASER GAME ============
const COLORS={floor:'#2d2d4a',wall:'#4a4a6a',entrance:'#3d5a3d',classroom:'#4A90D9',door:'#8B6914'};
const ROOMS=[
{id:'alg',name:'代數房',topic:'代數',tileX:2,tileY:2,w:3,h:2,color:'#4A90D9'},
{id:'geo',name:'幾何房',topic:'幾何',tileX:7,tileY:2,w:3,h:2,color:'#52C41A'},
{id:'stat',name:'統計房',topic:'統計',tileX:4,tileY:5,w:4,h:2,color:'#FAAD14'},
];
class MainScene extends Phaser.Scene{
  constructor(){super({key:'Main'});this.player=null;this.cursors=null;this.joystick={x:0,y:0};this.lastTile=null;this.lastRoom=null;}

  preload(){this.createPixelTextures();}

  create(){
    this.physics.world.setBounds(0,0,MAP_COLS*TILE,MAP_ROWS*TILE);
    this.drawMap();
    this.player=this.physics.add.sprite(5*TILE+24,7*TILE+24,'player');
    this.player.setCollideWorldBounds(true);
    this.cursors=this.input.keyboard.createCursorKeys();
    this.wasd=this.input.keyboard.addKeys('W,A,S,D');
    this.setupJoystick();
    this.cameras.main.setBounds(0,0,MAP_COLS*TILE,MAP_ROWS*TILE);
    this.cameras.main.startFollow(this.player,true,.8,.8);
    this.input.on('pointerdown',this.handleTap,this);
    this.HPRegen=this.time.addEvent({delay:3000,callback:()=>{if(gameState.hp<gameState.maxHp){gameState.hp=Math.min(gameState.maxHp,gameState.hp+1);updateHUD();}},loop:true});
    updateHUD();
  }

  createPixelTextures(){
    const mk=(key,w,h,draw)=>{const g=this.make.graphics({add:false});draw(g);g.generateTexture(key,w,h);g.destroy();};
    mk('floor',TILE,TILE,g=>{g.fillStyle(0x8b5d8b);g.fillRect(0,0,TILE,TILE);g.fillStyle(0x956799);g.fillRect(0,0,TILE/2,TILE/2);g.fillRect(TILE/2,TILE/2,TILE/2,TILE/2);});
    mk('wall',TILE,TILE,g=>{g.fillStyle(0x4a4a6a);g.fillRect(0,0,TILE,TILE);g.fillStyle(0x545474);g.fillRect(2,2,TILE-4,TILE-4);g.fillStyle(0x404060);g.fillRect(4,4,TILE-8,TILE-8);});
    mk('entrance',TILE,TILE,g=>{g.fillStyle(0x3d5a3d);g.fillRect(0,0,TILE,TILE);g.fillStyle(0x476447);g.fillRect(0,0,TILE/2,TILE);});
    mk('classroom',TILE,TILE,g=>{g.fillStyle(0x4a90d9);g.fillRect(0,0,TILE,TILE);g.fillStyle(0x549ae3);g.fillRect(4,4,TILE-8,TILE-8);});
    mk('door',TILE,TILE,g=>{g.fillStyle(0x8b6914);g.fillRect(0,0,TILE,TILE);g.fillStyle(0x9f7d28);g.fillRect(4,4,TILE-8,TILE-8);});
    mk('player',24,32,g=>{
      g.fillStyle(0xffc899);g.fillRect(8,0,8,8);
      g.fillStyle(0x4a90d9);g.fillRect(6,8,12,12);
      g.fillStyle(0x000000);g.fillRect(10,2,2,2);g.fillRect(14,2,2,2);
      g.fillStyle(0x323250);g.fillRect(6,20,4,12);g.fillRect(14,20,4,12);
      g.fillStyle(0x1e1e3c);g.fillRect(6,28,4,4);g.fillRect(14,28,4,4);
    });
    mk('heart',16,16,g=>{g.fillStyle(0xf5222d);g.fillCircle(8,8,7);g.fillStyle(0xff6464);g.fillCircle(6,6,3);});
  }

  drawMap(){
    const floor=this.add.group();
    for(let y=0;y<MAP_ROWS;y++)for(let x=0;x<MAP_COLS;x++){
      const t=this.getTile(x,y);
      if(t==='wall'){const w=this.add.sprite(x*TILE+24,y*TILE+24,'wall');floor.add(w);}
      else{const f=this.add.sprite(x*TILE+24,y*TILE+24,t==='entrance'?'entrance':'floor');floor.add(f);}
    }
    ROOMS.forEach(r=>{
      for(let dy=0;dy<r.h;dy++)for(let dx=0;dx<r.w;dx++){
        const x=r.tileX+dx,y=r.tileY+dy;
        const cl=this.add.sprite(x*TILE+24,y*TILE+24,'classroom');
        cl.setTint(parseInt(r.color.replace('#',''),16));
        floor.add(cl);
      }
      const sign=this.add.text((r.tileX+r.w/2)*TILE,(r.tileY-0.5)*TILE,r.name,{fontSize:'11px',color:'#fff',backgroundColor:'rgba(0,0,0,0.6)',padding:{x:4,y:2}});
      sign.setOrigin(.5);
    });
  }

  getTile(x,y){
    if(x<1||x>=MAP_COLS-1||y<1||y>=MAP_ROWS-1)return'wall';
    if(y===7&&x>=4&&x<=6)return'entrance';
    for(const r of ROOMS)if(x>=r.tileX&&x<r.tileX+r.w&&y>=r.tileY&&y<r.tileY+r.h)return'classroom';
    return'floor';
  }

  setupJoystick(){
    const zone=document.getElementById('joystick-zone');
    const knob=document.getElementById('joystick-knob');
    let drag=false,centerX=0,centerY=0;
    const handle=(e)=>{const t=e.touches?e.touches[0]:e;const dx=t.clientX-centerX,dy=t.clientY-centerY;const dist=Math.min(40,Math.sqrt(dx*dx+dy*dy));const ang=Math.atan2(dy,dx);this.joystick.x=Math.cos(ang)*dist/40;this.joystick.y=Math.sin(ang)*dist/40;knob.style.transform=`translate(${Math.cos(ang)*dist}px,${Math.sin(ang)*dist}px)`;};
    zone.addEventListener('mousedown',e=>{drag=true;zone.style.display='flex';centerX=e.clientX;centerY=e.clientY;zone.style.left=(centerX-60)+'px';zone.style.top=(centerY-60)+'px';handle(e);});
    window.addEventListener('mousemove',e=>{if(drag)handle(e);});
    window.addEventListener('mouseup',()=>{drag=false;this.joystick={x:0,y:0};knob.style.transform='translate(0,0)';});
    zone.addEventListener('touchstart',e=>{e.preventDefault();drag=true;const t=e.touches[0];centerX=t.clientX;centerY=t.clientY;zone.style.display='flex';zone.style.left=(centerX-60)+'px';zone.style.top=(centerY-60)+'px';},{passive:false});
    zone.addEventListener('touchmove',e=>{e.preventDefault();if(drag)handle(e);},{passive:false});
    zone.addEventListener('touchend',()=>{drag=false;this.joystick={x:0,y:0};knob.style.transform='translate(0,0)';});
  }

  handleTap(pointer){
    const worldPt=this.cameras.main.getWorldPoint(pointer.x,pointer.y);
    const tx=Math.floor(worldPt.x/TILE),ty=Math.floor(worldPt.y/TILE);
    for(const r of ROOMS){if(tx>=r.tileX&&tx<r.tileX+r.w&&ty>=r.tileY&&ty<r.tileY+r.h){startQuiz(r.topic,r.name);return;}}
  }

  update(){
    const speed=160;
    let vx=0,vy=0;
    if(this.cursors.left.isDown||this.wasd.A.isDown||this.joystick.x<-.3)vx=-1;
    else if(this.cursors.right.isDown||this.wasd.D.isDown||this.joystick.x>.3)vx=1;
    if(this.cursors.up.isDown||this.wasd.W.isDown||this.joystick.y<-.3)vy=-1;
    else if(this.cursors.down.isDown||this.wasd.S.isDown||this.joystick.y>.3)vy=1;
    if(vx!==0&&vy!==0){vx*=0.707;vy*=0.707;}
    this.player.setVelocity(vx*speed,vy*speed);
    if(vx!==0||vy!==0){
      this.player.setFlipX(vx<0);
      const tileX=Math.floor(this.player.x/TILE),tileY=Math.floor(this.player.y/TILE);
      const tileKey=tileX+'_'+tileY;
      if(this.lastTile!==tileKey){this.lastTile=tileKey;sfxStep();}
    }
    // Auto-trigger quiz when entering a room
    const px=Math.floor(this.player.x/TILE),py=Math.floor(this.player.y/TILE);
    if(!document.getElementById('quiz-overlay').style.display||document.getElementById('quiz-overlay').style.display==='none'){
      for(const r of ROOMS){
        if(px>=r.tileX&&px<r.tileX+r.w&&py>=r.tileY&&py<r.tileY+r.h){
          if(this.lastRoom!==r.id){this.lastRoom=r.id;startQuiz(r.topic,r.name);}
          return;
        }
      }
      this.lastRoom=null;
    }
  }
}

// ============ QUIZ ============
let currentQuiz={};
function startQuiz(topic,name){
  const filtered=QUESTIONS.filter(q=>q.topic===topic);
  const q=filtered[Math.floor(Math.random()*filtered.length)]||QUESTIONS[Math.floor(Math.random()*QUESTIONS.length)];
  currentQuiz=q;
  document.getElementById('quiz-overlay').style.display='flex';
  document.getElementById('quiz-topic').textContent=name+' 挑戰';
  const qEl=document.getElementById('quiz-question');
  renderMath(qEl,q.question);
  const optsEl=document.getElementById('quiz-options');
  optsEl.innerHTML='';
  const keys=Object.keys(q.options);
  keys.forEach(k=>{
    const btn=document.createElement('button');
    btn.className='quiz-option';
    const optEl=document.createElement('span');
    renderMath(optEl,q.options[k]);
    btn.appendChild(optEl);
    btn.dataset.key=k;
    btn.onclick=()=>submitAnswer(k);
    optsEl.appendChild(btn);
  });
  document.getElementById('quiz-feedback').textContent='';
  document.getElementById('quiz-feedback').className='';
}
function submitAnswer(key){
  const btns=document.querySelectorAll('.quiz-option');
  btns.forEach(b=>b.classList.add('disabled'));
  const isCorrect=key===currentQuiz.answer;
  document.querySelector(`.quiz-option[data-key="${key}"]`).classList.add(isCorrect?'correct':'wrong');
  if(!isCorrect)document.querySelector(`.quiz-option[data-key="${currentQuiz.answer}"]`).classList.add('correct');
  if(isCorrect){sfxCorrect();addXP(20+currentQuiz.difficulty*5);gameState.correctAnswers++;document.getElementById('quiz-feedback').textContent='✓ 正確！ +'+(20+currentQuiz.difficulty*5)+' XP';document.getElementById('quiz-feedback').className='correct';}
  else{sfxWrong();loseHP(20);document.getElementById('quiz-feedback').textContent='✗ 錯誤！ -20 HP';document.getElementById('quiz-feedback').className='wrong';}
  gameState.questionsAnswered++;saveState();
  setTimeout(exitQuiz,1500);
}
function exitQuiz(){
  document.getElementById('quiz-overlay').style.display='none';
}
// ============ INIT ============
loadState();
const isMobile=/Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
if(isMobile)document.getElementById('joystick-zone').style.display='block';
const game=new Phaser.Game({
  type:Phaser.AUTO,
  parent:'game-container',
  width:MAP_COLS*TILE,
  height:MAP_ROWS*TILE,
  pixelArt:true,
  physics:{default:'arcade',arcade:{gravity:{y:0},debug:false}},
  scene:MainScene,
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  backgroundColor:'#1A1A2E'
});
</script>
