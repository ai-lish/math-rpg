<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>數學探索RPG</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1A1A2E;font-family:'Segoe UI',sans-serif;overflow:hidden;touch-action:none}
#game-container{width:100vw;height:100vh;display:block}

/* ===== HUD ===== */
#hud{position:fixed;top:0;left:0;right:56px;padding:10px 15px;display:flex;gap:12px;z-index:100;pointer-events:none;flex-wrap:wrap}
.hud-item{display:flex;align-items:center;gap:6px;color:#fff;font-size:14px;font-weight:600}
.hud-bar{width:80px;height:10px;background:#2d2d4a;border-radius:5px;overflow:hidden}
.hud-fill{height:100%;border-radius:5px;transition:width .3s}
#hp-bar{background:linear-gradient(90deg,#F5222D,#FF6B6B)}
#xp-bar{background:linear-gradient(90deg,#FAAD14,#FFD700)}
#hp-text,#xp-text{font-size:12px;color:#ccc}
#streak-display{display:none;align-items:center;gap:4px;color:#FF6B35;font-size:13px;font-weight:700}
#streak-display.active{display:flex}

/* ===== TOP-RIGHT AUTH ===== */
#auth-area{position:fixed;top:8px;right:8px;z-index:120;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
#user-info{display:none;flex-direction:column;align-items:flex-end;gap:2px}
#user-name{color:#fff;font-size:12px;font-weight:600}
#user-level{color:#FAAD14;font-size:11px}
#login-btn{background:#4A90D9;border:none;color:#fff;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
#login-btn:hover{background:#357ABD}
#logout-btn{display:none;background:transparent;border:1px solid #F5222D;color:#F5222D;padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px}
#logout-btn:hover{background:#F5222D;color:#fff}
#leaderboard-btn{background:#FAAD14;border:none;color:#1A1A2E;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700}

/* ===== MENU BUTTON ===== */
#menu-btn{position:fixed;top:10px;right:160px;z-index:110;background:#4A90D9;border:none;color:#fff;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px}

/* ===== QUIZ OVERLAY ===== */
#quiz-overlay{display:none;position:fixed;inset:0;background:rgba(26,26,46,.97);z-index:200;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#quiz-card{background:#16213e;border-radius:16px;padding:24px;max-width:500px;width:100%;border:2px solid #4A90D9;box-shadow:0 0 30px rgba(74,144,217,.3)}
#quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
#quiz-topic{color:#4A90D9;font-size:13px;text-transform:uppercase;letter-spacing:1px}
#quiz-meta{color:#888;font-size:12px;display:flex;gap:8px}
#quiz-streak{color:#FF6B35;font-weight:700}
#quiz-question{margin-bottom:16px;font-size:17px;color:#fff;line-height:1.6;min-height:50px}
#quiz-question .katex{font-size:1.2em}
.quiz-options{display:flex;flex-direction:column;gap:8px}
.quiz-option{background:#1f2d4a;border:2px solid #2d4a6a;border-radius:10px;padding:12px 16px;color:#fff;font-size:15px;cursor:pointer;transition:all .2s;text-align:left}
.quiz-option:hover,.quiz-option:active{border-color:#4A90D9;background:#2d4a6a}
.quiz-option.correct{border-color:#52C41A;background:rgba(82,196,26,.2)}
.quiz-option.wrong{border-color:#F5222D;background:rgba(245,34,45,.2)}
.quiz-option.disabled{pointer-events:none;opacity:.7}
#quiz-feedback{margin-top:14px;text-align:center;font-size:15px;font-weight:700;min-height:22px}
#quiz-feedback.correct{color:#52C41A}
#quiz-feedback.wrong{color:#F5222D}
#quiz-exit{margin-top:14px;background:transparent;border:2px solid #4A90D9;color:#4A90D9;padding:8px 24px;border-radius:8px;cursor:pointer;font-size:14px}
#quiz-exit:hover{background:#4A90D9;color:#fff}
#quiz-nav{margin-top:8px;display:flex;justify-content:center;gap:8px}
.quiz-nav-btn{background:#2d4a6a;border:none;color:#fff;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px}
.quiz-nav-btn:hover{background:#3d5a7a}

/* ===== LEVEL UP ===== */
#level-up{display:none;position:fixed;inset:0;z-index:300;background:rgba(26,26,46,.92);flex-direction:column;align-items:center;justify-content:center}
.level-up-text{font-size:48px;color:#FAAD14;font-weight:900;text-align:center;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.level-up-sub{font-size:20px;color:#fff;margin-top:10px}

/* ===== JOYSTICK ===== */
#joystick-zone{display:none;position:fixed;bottom:30px;left:30px;width:120px;height:120px;z-index:150;pointer-events:all}
#joystick-base{width:100%;height:100%;background:rgba(255,255,255,.1);border-radius:50%;border:3px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center}
#joystick-knob{width:50px;height:50px;background:#4A90D9;border-radius:50%;opacity:.8;transition:transform .1s}

/* ===== MENU OVERLAY ===== */
#menu{display:none;position:fixed;inset:0;z-index:400;background:rgba(26,26,46,.96);flex-direction:column;align-items:center;justify-content:center;gap:14px}
.menu-title{color:#fff;font-size:22px;font-weight:700;margin-bottom:6px}
.menu-subtitle{color:#888;font-size:13px;margin-bottom:8px}
.menu-btn{background:#4A90D9;border:none;color:#fff;padding:12px 36px;border-radius:8px;cursor:pointer;font-size:15px;font-weight:600;min-width:200px}
.menu-btn:hover{background:#357ABD}
.menu-btn.danger{background:#F5222D}
.menu-btn.danger:hover{background:#D91B1B}
.menu-btn.gold{background:#FAAD14;color:#1A1A2E}
.menu-btn.gold:hover{background:#E59B00}

/* ===== LEADERBOARD PANEL ===== */
#leaderboard-panel{display:none;position:fixed;inset:0;z-index:500;background:rgba(26,26,46,.97);flex-direction:column;align-items:center;justify-content:center;padding:20px}
#leaderboard-card{background:#16213e;border-radius:16px;padding:24px;max-width:420px;width:100%;border:2px solid #FAAD14;max-height:80vh;overflow-y:auto}
.lb-title{color:#FAAD14;font-size:20px;font-weight:800;text-align:center;margin-bottom:16px}
.lb-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;margin-bottom:6px}
.lb-row:nth-child(even){background:rgba(255,255,255,.03)}
.lb-rank{font-size:16px;font-weight:800;min-width:30px;text-align:center}
.lb-rank.gold{color:#FFD700}
.lb-rank.silver{color:#C0C0C0}
.lb-rank.bronze{color:#CD7F32}
.lb-name{flex:1;color:#fff;font-size:14px}
.lb-level{color:#4A90D9;font-size:13px;font-weight:600}
.lb-xp{color:#FAAD14;font-size:12px}
.lb-close{margin-top:16px;background:#FAAD14;border:none;color:#1A1A2E;padding:10px 32px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700}

/* ===== DAILY TASKS PANEL ===== */
#daily-tasks-panel{display:none;position:fixed;inset:0;z-index:500;background:rgba(26,26,46,.97);flex-direction:column;align-items:center;justify-content:center;padding:20px}
#tasks-card{background:#16213e;border-radius:16px;padding:24px;max-width:400px;width:100%;border:2px solid #52C41A}
.tasks-title{color:#52C41A;font-size:20px;font-weight:800;text-align:center;margin-bottom:16px}
.task-row{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(255,255,255,.03);border-radius:8px;margin-bottom:8px}
.task-icon{font-size:24px}
.task-info{flex:1}
.task-name{color:#fff;font-size:14px;font-weight:600}
.task-desc{color:#888;font-size:12px}
.task-progress{color:#FAAD14;font-size:13px;font-weight:700;min-width:50px;text-align:right}
.task-reward{color:#52C41A;font-size:12px}
.task-complete{text-decoration:line-through;opacity:.5}
.tasks-close{margin-top:16px;background:#52C41A;border:none;color:#fff;padding:10px 32px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700}

/* ===== FIREBASE STATUS ===== */
#firebase-status{position:fixed;bottom:10px;right:10px;z-index:90;font-size:11px;padding:4px 8px;border-radius:4px;display:none}
#firebase-status.offline{background:#F5222D;color:#fff}
#firebase-status.online{background:#52C41A;color:#fff}
</style>
</head>
<body>
<div id="game-container"></div>

<!-- HUD -->
<div id="hud">
  <div class="hud-item"><span style="color:#F5222D">❤</span><div class="hud-bar"><div class="hud-fill" id="hp-bar" style="width:100%"></div></div><span id="hp-text">100</span></div>
  <div class="hud-item"><span style="color:#FAAD14">⭐</span><div class="hud-bar"><div class="hud-fill" id="xp-bar" style="width:0%"></div></div><span id="xp-text">0</span><span id="level-text" style="color:#FAAD14">Lv.1</span></div>
  <div id="streak-display" class="hud-item">🔥<span id="streak-num">0</span></div>
</div>

<!-- Auth Area -->
<div id="auth-area">
  <div id="user-info">
    <div id="user-name">Player</div>
    <div id="user-level">Lv.1</div>
  </div>
  <button id="leaderboard-btn" onclick="showLeaderboard()">🏆 排行榜</button>
  <button id="login-btn" onclick="signIn()">🔐 登入</button>
  <button id="logout-btn" onclick="signOut()">登出</button>
</div>

<button id="menu-btn" onclick="showMenu()">選單 ☰</button>

<!-- Quiz Overlay -->
<div id="quiz-overlay">
  <div id="quiz-card">
    <div id="quiz-header">
      <div id="quiz-topic">代數房</div>
      <div id="quiz-meta">
        <span id="quiz-streak">🔥0連勝</span>
        <span id="quiz-qnum">Q1</span>
      </div>
    </div>
    <div id="quiz-question"></div>
    <div class="quiz-options" id="quiz-options"></div>
    <div id="quiz-feedback"></div>
    <div id="quiz-nav">
      <button class="quiz-nav-btn" onclick="showDailyTasks()">📋 每日任務</button>
      <button class="quiz-nav-btn" onclick="exitQuiz()">離開</button>
    </div>
  </div>
</div>

<!-- Level Up -->
<div id="level-up"><div class="level-up-text">⬆️ 升級！</div><div class="level-up-sub" id="level-up-info">等級 2</div></div>

<!-- Joystick -->
<div id="joystick-zone"><div id="joystick-base"><div id="joystick-knob"></div></div></div>

<!-- Menu -->
<div id="menu">
  <div class="menu-title">📋 選單</div>
  <div class="menu-subtitle" id="menu-player-info"></div>
  <button class="menu-btn gold" onclick="showDailyTasks();closeMenu();">📋 每日任務</button>
  <button class="menu-btn" onclick="showLeaderboard();closeMenu();">🏆 排行榜</button>
  <button class="menu-btn danger" onclick="resetGame()">重新開始</button>
  <button class="menu-btn" onclick="closeMenu()">繼續遊戲</button>
</div>

<!-- Leaderboard Panel -->
<div id="leaderboard-panel">
  <div id="leaderboard-card">
    <div class="lb-title">🏆 排行榜</div>
    <div id="leaderboard-list"></div>
    <button class="lb-close" onclick="closeLeaderboard()">關閉</button>
  </div>
</div>

<!-- Daily Tasks Panel -->
<div id="daily-tasks-panel">
  <div id="tasks-card">
    <div class="tasks-title">📋 每日任務</div>
    <div id="tasks-list"></div>
    <button class="tasks-close" onclick="closeDailyTasks()">關閉</button>
  </div>
</div>

<!-- Firebase Status -->
<div id="firebase-status">離線</div>

<script>

// ============================================================
// Fill in your Firebase config in firebase-config.js

let firebaseConfigured = false;

try {
  // Try to load config
  if (typeof FirebaseConfig !== 'undefined') {
    firebase.initializeApp(FirebaseConfig);
    auth = firebase.auth();
    db = firebase.database();
    firebaseConfigured = true;
    document.getElementById('firebase-status').style.display = 'block';
    document.getElementById('firebase-status').textContent = '在線';
    document.getElementById('firebase-status').className = 'online';
  }
} catch(e) {
  console.log('Firebase not configured - offline mode');
  document.getElementById('firebase-status').style.display = 'block';
  document.getElementById('firebase-status').textContent = '離線';
  document.getElementById('firebase-status').className = 'offline';

// ============================================================
// FIREBASE HELPERS
// ============================================================
function getPlayerRef(uid){return db.ref('players/'+uid)}
function getLeaderboardRef(){return db.ref('leaderboard')}
function getOnlineRef(uid){return db.ref('online/'+uid)}

function syncToFirebase(){
  if(!firebaseConfigured||!currentUser)return;
  const updates={level:gameState.level,xp:gameState.xp,hp:gameState.hp,
    questionsAnswered:gameState.questionsAnswered,correctAnswers:gameState.correctAnswers,
    streak:gameState.streak,maxStreak:gameState.maxStreak,
    dailyCorrect:gameState.dailyCorrect,lastPlayed:Date.now()};
  getPlayerRef(currentUser.uid).update(updates);
  getLeaderboardRef().child(currentUser.uid).update({
    name:currentUser.displayName||currentUser.email||'Player',
    level:gameState.level,xp:gameState.xp,lastPlayed:Date.now()
  });
}

function loadFromFirebase(uid){
  return getPlayerRef(uid).once('value').then(snap=>{
    if(snap.exists()){
      const d=snap.val();
      gameState={...gameState,...d};
      updateHUD();
    }
  });
}

let batchQueue=[];
let lastSyncTime=0;
const SYNC_INTERVAL=30000; // 30 seconds

function queueAnswer(questionId,isCorrect,difficulty){
  batchQueue.push({questionId,isCorrect,difficulty,timestamp:Date.now()});
  const now=Date.now();
  if(now-lastSyncTime>SYNC_INTERVAL){flushBatch();lastSyncTime=now;}
}

function flushBatch(){
  if(!currentUser||batchQueue.length===0)return;
  const payload={uid:currentUser.uid,name:currentUser.displayName||'Player',
    ...gameState,answers:batchQueue.slice(-20),timestamp:Date.now()};
  // Send to GAS if configured
  if(gasUrl){
    fetch(gasUrl,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'sync',...payload})}).catch(()=>{});
  }
  batchQueue=[];
}

function syncOnlineStatus(){
  if(!firebaseConfigured||!currentUser)return;
  const onRef=getOnlineRef(currentUser.uid);
  onRef.set({name:currentUser.displayName||'Player',lastSeen:Date.now()});
  onRef.onDisconnect().remove();
}

// ============================================================
// GAS (Google Apps Script) HELPERS
// ============================================================
function submitToGAS(answerData){
  if(!gasUrl)return;
  fetch(gasUrl,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'submitAnswer',uid:currentUser?.uid,...answerData})}).catch(()=>{});
}

function signIn(){
  if(!firebaseConfigured){alert('Firebase未配置，無法登入。\n請查看 SETUP.md 了解如何配置。');return;}
  const provider=new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({hd:'lsh.edu.hk'}); // School domain
  firebase.auth().signInWithPopup(provider).then(result=>{
    currentUser=result.user;
    updateAuthUI();
    loadFromFirebase(currentUser.uid).then(()=>syncToFirebase());
    syncOnlineStatus();
  }).catch(err=>{console.error(err);alert('登入失敗: '+err.message);});
}

function signOut(){
  if(!firebaseConfigured){return;}
  if(currentUser)getOnlineRef(currentUser.uid).remove();
  firebase.auth().signOut().then(()=>{
    currentUser=null;updateAuthUI();
  });
}

function updateAuthUI(){
  const loginBtn=document.getElementById('login-btn');
  const logoutBtn=document.getElementById('logout-btn');

}

function loadState(){
  const s=localStorage.getItem('mathrpg_v1');
  if(s){try{const d=JSON.parse(s);gameState={...gameState,...d};}catch(e){}}
  // Reset daily if new day
  const today=new Date().toDateString();
  if(gameState.lastDailyReset!==today){
    gameState.dailyCorrect=0;
    gameState.dailyTasks={correct5:false,correct10:false,streak3:false};
    gameState.lastDailyReset=today;
    saveState();
  }
  updateHUD();updateStreakUI();
}

function saveState(){
  localStorage.setItem('mathrpg_v1',JSON.stringify(gameState));
}

function updateHUD(){
  const hpPct=Math.max(0,gameState.hp/gameState.maxHp*100);
  document.getElementById('hp-bar').style.width=hpPct+'%';
  document.getElementById('hp-text').textContent=Math.round(gameState.hp);
  const xpPct=gameState.xp/(100*gameState.level)*100;
  document.getElementById('xp-bar').style.width=Math.min(100,xpPct)+'%';
  document.getElementById('xp-text').textContent=gameState.xp;
  document.getElementById('level-text').textContent='Lv.'+gameState.level;
  document.getElementById('user-level')&&(document.getElementById('user-level').textContent='Lv.'+gameState.level);
}

function updateStreakUI(){
  const el=document.getElementById('streak-display');
  const num=document.getElementById('streak-num');
  if(gameState.streak>=2){
    el.classList.add('active');
    num.textContent=gameState.streak;
  } else {
    el.classList.remove('active');
  }
}

function addXP(amt){
  gameState.xp+=amt;
  const needed=100*gameState.level;
  if(gameState.xp>=needed){
    gameState.xp-=needed;gameState.level++;
    sfxLevelUp();showLevelUp();
  }
  saveState();updateHUD();
  if(currentUser)syncToFirebase();
}

function loseHP(amt){
  gameState.hp=Math.max(0,gameState.hp-amt);
  gameState.streak=0;updateStreakUI();
  if(gameState.hp<=0){
    gameState.hp=gameState.maxHp;
    gameState.xp=Math.max(0,gameState.xp-10);
  }
  saveState();updateHUD();
  if(currentUser)syncToFirebase();
}

function showLevelUp(){
  document.getElementById('level-up').style.display='flex';
  document.getElementById('level-up-info').textContent='等級 '+gameState.level;
  setTimeout(()=>{document.getElementById('level-up').style.display='none';},2500);
}

function checkDailyTasks(){
  // Update daily task progress
  const dts=dailyTasksState.tasks;
  dts[0].current=gameState.dailyCorrect;
  dts[1].current=gameState.dailyCorrect;
  dts[2].current=gameState.streak;
  // Check completions and rewards
  dts.forEach(t=>{
    if(!t.rewarded&&t.current>=t.target){
      t.rewarded=true;
      addXP(t.reward);
    }
  });
  saveState();
}

const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function playTone(freq,dur,type='square',vol=.15){
  try{initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);}catch(e){}
}
function sfxCorrect(){playTone(523,.15,'sine',.2);setTimeout(()=>playTone(659,.15,'sine',.2),100);setTimeout(()=>playTone(784,.2,'sine',.2),200);}
function sfxWrong(){playTone(200,.3,'sawtooth',.15)}
function sfxLevelUp(){playTone(440,.1,'sine',.2);setTimeout(()=>playTone(554,.1,'sine',.2),100);setTimeout(()=>playTone(659,.1,'sine',.2),200);setTimeout(()=>playTone(880,.3,'sine',.2),300);}
function sfxStep(){playTone(300,.05,'triangle',.05)}
function sfxStreak(){playTone(880,.1,'sine',.2);setTimeout(()=>playTone(1100,.15,'sine',.2),80);}

let currentQuiz={};
let quizQuestionCount=0;

function startQuiz(topic,name){
  // Get questions for this topic from ALL questions
  const filtered=ALL_QUESTIONS.filter(q=>q.topic===topic);
  const q=filtered[Math.floor(Math.random()*filtered.length)]||ALL_QUESTIONS[Math.floor(Math.random()*ALL_QUESTIONS.length)];
  currentQuiz=q;
  quizQuestionCount++;
  
  document.getElementById('quiz-overlay').style.display='flex';
  document.getElementById('quiz-topic').textContent=name+' 挑戰';
  document.getElementById('quiz-streak').textContent='🔥'+gameState.streak+'連勝';
  document.getElementById('quiz-qnum').textContent='Q'+quizQuestionCount;
  
  const qEl=document.getElementById('quiz-question');
  qEl.innerHTML='';
  renderMath(qEl,q.question);
  
  const optsEl=document.getElementById('quiz-options');
  optsEl.innerHTML='';
  const keys=Object.keys(q.options);
  keys.forEach(k=>{
    const btn=document.createElement('button');
    btn.className='quiz-option';
    const optEl=document.createElement('span');
    renderMath(optEl,q.options[k]);
    btn.appendChild(optEl);
    btn.dataset.key=k;
    btn.onclick=()=>submitAnswer(k);
    optsEl.appendChild(btn);
  });
  
  document.getElementById('quiz-feedback').textContent='';
  document.getElementById('quiz-feedback').className='';
}

function submitAnswer(key){
  const btns=document.querySelectorAll('.quiz-option');
  btns.forEach(b=>b.classList.add('disabled'));
  const isCorrect=(key===currentQuiz.answer);
  
  document.querySelector(`.quiz-option[data-key="${key}"]`).classList.add(isCorrect?'correct':'wrong');
  if(!isCorrect){
    document.querySelector(`.quiz-option[data-key="${currentQuiz.answer}"]`).classList.add('correct');
  }
  
  const xpGain=20+currentQuiz.difficulty*5;
  
  if(isCorrect){
    sfxCorrect();
    // Streak bonus
    gameState.streak++;
    if(gameState.streak>gameState.maxStreak)gameState.maxStreak=gameState.streak;
    const streakBonus=gameState.streak>=3?Math.floor(gameState.streak*2):0;
    addXP(xpGain+streakBonus);
    gameState.correctAnswers++;
    gameState.dailyCorrect++;
    const bonusText=streakBonus>0?` +${streakBonus}連勝`:'';
    document.getElementById('quiz-feedback').textContent=`✓ 正確！ +${xpGain}${bonusText} XP`;
    document.getElementById('quiz-feedback').className='correct';
    if(gameState.streak>=3)sfxStreak();
    queueAnswer(currentQuiz.id,true,currentQuiz.difficulty);
    submitToGAS({questionId:currentQuiz.id,answer:key,isCorrect:true,difficulty:currentQuiz.difficulty});
  } else {
    sfxWrong();
    gameState.streak=0;
    loseHP(20);
    document.getElementById('quiz-feedback').textContent='✗ 錯誤！ -20 HP';
    document.getElementById('quiz-feedback').className='wrong';
    queueAnswer(currentQuiz.id,false,currentQuiz.difficulty);
    submitToGAS({questionId:currentQuiz.id,answer:key,isCorrect:false,difficulty:currentQuiz.difficulty});
  }
  
  gameState.questionsAnswered++;
  checkDailyTasks();
  updateStreakUI();
  saveState();
  setTimeout(exitQuiz,1500);
}

function exitQuiz(){
  document.getElementById('quiz-overlay').style.display='none';
}

class MainScene extends Phaser.Scene{
  constructor(){super({key:'Main'});this.player=null;this.cursors=null;this.joystick={x:0,y:0};this.lastTile=null;this.lastRoom=null;}
  
  preload(){this.createPixelTextures();}
  
  create(){
    this.physics.world.setBounds(0,0,MAP_COLS*TILE,MAP_ROWS*TILE);
    this.drawMap();
    this.player=this.physics.add.sprite(5*TILE+24,7*TILE+24,'player');
    this.player.setCollideWorldBounds(true);
    this.cursors=this.input.keyboard.createCursorKeys();
    this.wasd=this.input.keyboard.addKeys('W,A,S,D');
    this.setupJoystick();
    this.cameras.main.setBounds(0,0,MAP_COLS*TILE,MAP_ROWS*TILE);
    this.cameras.main.startFollow(this.player,true,.8,.8);
    this.input.on('pointerdown',this.handleTap,this);
    this.HPRegen=this.time.addEvent({delay:3000,callback:()=>{
      if(gameState.hp<gameState.maxHp){gameState.hp=Math.min(gameState.maxHp,gameState.hp+1);updateHUD();}
    },loop:true});
    updateHUD();
  }
  
  createPixelTextures(){
    const mk=(key,w,h,draw)=>{const g=this.make.graphics({add:false});draw(g);g.generateTexture(key,w,h);g.destroy();};
    mk('floor',TILE,TILE,g=>{g.fillStyle(0x8b5d8b);g.fillRect(0,0,TILE,TILE);g.fillStyle(0x956799);g.fillRect(0,0,TILE/2,TILE/2);g.fillRect(TILE/2,TILE/2,TILE/2,TILE/2);});
    mk('wall',TILE,TILE,g=>{g.fillStyle(0x4a4a6a);g.fillRect(0,0,TILE,TILE);g.fillStyle(0x545474);g.fillRect(2,2,TILE-4,TILE-4);g.fillStyle(0x404060);g.fillRect(4,4,TILE-8,TILE-8);});
    mk('entrance',TILE,TILE,g=>{g.fillStyle(0x3d5a3d);g.fillRect(0,0,TILE,TILE);g.fillStyle(0x476447);g.fillRect(0,0,TILE/2,TILE);});
    mk('classroom',TILE,TILE,g=>{g.fillStyle(0x4a90d9);g.fillRect(0,0,TILE,TILE);g.fillStyle(0x549ae3);g.fillRect(4,4,TILE-8,TILE-8);});
    mk('door',TILE,TILE,g=>{g.fillStyle(0x8b6914);g.fillRect(0,0,TILE,TILE);g.fillStyle(0x9f7d28);g.fillRect(4,4,TILE-8,TILE-8);});
    mk('player',24,32,g=>{
      g.fillStyle(0xffc899);g.fillRect(8,0,8,8);
      g.fillStyle(0x4a90d9);g.fillRect(6,8,12,12);
      g.fillStyle(0x000000);g.fillRect(10,2,2,2);g.fillRect(14,2,2,2);
      g.fillStyle(0x323250);g.fillRect(6,20,4,12);g.fillRect(14,20,4,12);
      g.fillStyle(0x1e1e3c);g.fillRect(6,28,4,4);g.fillRect(14,28,4,4);
    });
    mk('heart',16,16,g=>{g.fillStyle(0xf5222d);g.fillCircle(8,8,7);g.fillStyle(0xff6464);g.fillCircle(6,6,3);});
  }
  
  drawMap(){
    const floor=this.add.group();
    for(let y=0;y<MAP_ROWS;y++)for(let x=0;x<MAP_COLS;x++){
      const t=this.getTile(x,y);
      if(t==='wall'){const w=this.add.sprite(x*TILE+24,y*TILE+24,'wall');floor.add(w);}
      else{const f=this.add.sprite(x*TILE+24,y*TILE+24,t==='entrance'?'entrance':'floor');floor.add(f);}
    }
    ROOMS.forEach(r=>{
      for(let dy=0;dy<r.h;dy++)for(let dx=0;dx<r.w;dx++){
        const x=r.tileX+dx,y=r.tileY+dy;
        const cl=this.add.sprite(x*TILE+24,y*TILE+24,'classroom');
        cl.setTint(parseInt(r.color.replace('#',''),16));
        floor.add(cl);
      }
      const sign=this.add.text((r.tileX+r.w/2)*TILE,(r.tileY-0.5)*TILE,r.name,{fontSize:'11px',color:'#fff',backgroundColor:'rgba(0,0,0,0.6)',padding:{x:4,y:2}});
      sign.setOrigin(.5);
    });
  }
  
  getTile(x,y){
    if(x<1||x>=MAP_COLS-1||y<1||y>=MAP_ROWS-1)return'wall';
    if(y===7&&x>=4&&x<=6)return'entrance';
    for(const r of ROOMS)if(x>=r.tileX&&x<r.tileX+r.w&&y>=r.tileY&&y<r.tileY+r.h)return'classroom';
    return'floor';
  }
  
  setupJoystick(){
    const zone=document.getElementById('joystick-zone');
    const knob=document.getElementById('joystick-knob');
    let drag=false,centerX=0,centerY=0;
    const handle=(e)=>{
      const t=e.touches?e.touches[0]:e;
      const dx=t.clientX-centerX,dy=t.clientY-centerY;
      const dist=Math.min(40,Math.sqrt(dx*dx+dy*dy));
      const ang=Math.atan2(dy,dx);
      this.joystick.x=Math.cos(ang)*dist/40;
      this.joystick.y=Math.sin(ang)*dist/40;
      knob.style.transform=`translate(${Math.cos(ang)*dist}px,${Math.sin(ang)*dist}px)`;
    };
    zone.addEventListener('mousedown',e=>{drag=true;zone.style.display='flex';centerX=e.clientX;centerY=e.clientY;zone.style.left=(centerX-60)+'px';zone.style.top=(centerY-60)+'px';handle(e);});
    window.addEventListener('mousemove',e=>{if(drag)handle(e);});
    window.addEventListener('mouseup',()=>{drag=false;this.joystick={x:0,y:0};knob.style.transform='translate(0,0)';});
    zone.addEventListener('touchstart',e=>{e.preventDefault();drag=true;const t=e.touches[0];centerX=t.clientX;centerY=t.clientY;zone.style.display='flex';zone.style.left=(centerX-60)+'px';zone.style.top=(centerY-60)+'px';},{passive:false});
    zone.addEventListener('touchmove',e=>{e.preventDefault();if(drag)handle(e);},{passive:false});
    zone.addEventListener('touchend',()=>{drag=false;this.joystick={x:0,y:0};knob.style.transform='translate(0,0)';});
  }
  
  handleTap(pointer){
    const worldPt=this.cameras.main.getWorldPoint(pointer.x,pointer.y);
    const tx=Math.floor(worldPt.x/TILE),ty=Math.floor(worldPt.y/TILE);
    for(const r of ROOMS){if(tx>=r.tileX&&tx<r.tileX+r.w&&ty>=r.tileY&&ty<r.tileY+r.h){startQuiz(r.topic,r.name);return;}}
  }
  
  update(){
    const speed=160;
    let vx=0,vy=0;
    if(this.cursors.left.isDown||this.wasd.A.isDown||this.joystick.x<-.3)vx=-1;
    else if(this.cursors.right.isDown||this.wasd.D.isDown||this.joystick.x>.3)vx=1;
    if(this.cursors.up.isDown||this.wasd.W.isDown||this.joystick.y<-.3)vy=-1;
    else if(this.cursors.down.isDown||this.wasd.S.isDown||this.joystick.y>.3)vy=1;
    if(vx!==0&&vy!==0){vx*=0.707;vy*=0.707;}
    this.player.setVelocity(vx*speed,vy*speed);
    if(vx!==0||vy!==0){
      this.player.setFlipX(vx<0);
      const tileX=Math.floor(this.player.x/TILE),tileY=Math.floor(this.player.y/TILE);
      const tileKey=tileX+'_'+tileY;
      if(this.lastTile!==tileKey){this.lastTile=tileKey;sfxStep();}
    }
    const px=Math.floor(this.player.x/TILE),py=Math.floor(this.player.y/TILE);
    if(!document.getElementById('quiz-overlay').style.display||document.getElementById('quiz-overlay').style.display==='none'){
      for(const r of ROOMS){
        if(px>=r.tileX&&px<r.tileX+r.w&&py>=r.tileY&&py<r.tileY+r.h){
          if(this.lastRoom!==r.id){this.lastRoom=r.id;startQuiz(r.topic,r.name);}
          return;
        }
      }
      this.lastRoom=null;
    }
  }
}

function resetGame(){
  if(confirm('確定要重新開始嗎？所有進度將會清除。')){
    localStorage.removeItem('mathrpg_v1');
    location.reload();
  }
}

}

// Load state and init game
loadState();

if(isMobile)document.getElementById('joystick-zone').style.display='block';

const game=new Phaser.Game({

  parent:'game-container',
  width:MAP_COLS*TILE,
  height:MAP_ROWS*TILE,
  pixelArt:true,
  physics:{default:'arcade',arcade:{gravity:{y:0},debug:false}},
  scene:MainScene,
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},

});

// Periodic batch sync
setInterval(flushBatch,30000);
// Sync online status every minute
setInterval(syncOnlineStatus,60000);
