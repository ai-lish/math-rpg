<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>數學探索RPG</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1A1A2E;font-family:'Segoe UI',sans-serif;overflow:hidden;touch-action:none}
#game-container{width:100vw;height:100vh;display:block}

/* ===== HUD ===== */
#hud{position:fixed;top:0;left:0;right:56px;padding:10px 15px;display:flex;gap:12px;z-index:100;pointer-events:none;flex-wrap:wrap}
.hud-item{display:flex;align-items:center;gap:6px;color:#fff;font-size:14px;font-weight:600}
.hud-bar{width:80px;height:10px;background:#2d2d4a;border-radius:5px;overflow:hidden}
.hud-fill{height:100%;border-radius:5px;transition:width .3s}
#hp-bar{background:linear-gradient(90deg,#F5222D,#FF6B6B)}
#xp-bar{background:linear-gradient(90deg,#FAAD14,#FFD700)}
#hp-text,#xp-text{font-size:12px;color:#ccc}
#streak-display{display:none;align-items:center;gap:4px;color:#FF6B35;font-size:13px;font-weight:700}
#streak-display.active{display:flex}

/* ===== TOP-RIGHT AUTH ===== */
#auth-area{position:fixed;top:8px;right:8px;z-index:120;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
#user-info{display:none;flex-direction:column;align-items:flex-end;gap:2px}
#user-name{color:#fff;font-size:12px;font-weight:600}
#user-level{color:#FAAD14;font-size:11px}
#login-btn{background:#4A90D9;border:none;color:#fff;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
#login-btn:hover{background:#357ABD}
#logout-btn{display:none;background:transparent;border:1px solid #F5222D;color:#F5222D;padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px}
#logout-btn:hover{background:#F5222D;color:#fff}
#leaderboard-btn{background:#FAAD14;border:none;color:#1A1A2E;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700}

/* ===== MENU BUTTON ===== */
#menu-btn{position:fixed;top:10px;right:160px;z-index:110;background:#4A90D9;border:none;color:#fff;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px}

/* ===== QUIZ OVERLAY ===== */
#quiz-overlay{display:none;position:fixed;inset:0;background:rgba(26,26,46,.97);z-index:200;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#quiz-card{background:#16213e;border-radius:16px;padding:24px;max-width:500px;width:100%;border:2px solid #4A90D9;box-shadow:0 0 30px rgba(74,144,217,.3)}
#quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
#quiz-topic{color:#4A90D9;font-size:13px;text-transform:uppercase;letter-spacing:1px}
#quiz-meta{color:#888;font-size:12px;display:flex;gap:8px}
#quiz-streak{color:#FF6B35;font-weight:700}
#quiz-question{margin-bottom:16px;font-size:17px;color:#fff;line-height:1.6;min-height:80px;max-height:120px;overflow-y:auto;padding:8px}
#quiz-question .katex,#quiz-question .katex *{font-size:1.1em}
#quiz-question .katex{display:block;text-align:center;margin:8px 0}
.quiz-option .katex{font-size:1em}
.quiz-option .katex *{font-size:inherit}
.quiz-options{display:flex;flex-direction:column;gap:8px}
.quiz-option{background:#1f2d4a;border:2px solid #2d4a6a;border-radius:10px;padding:12px 16px;color:#fff;font-size:15px;cursor:pointer;transition:all .2s;text-align:left}
.quiz-option:hover,.quiz-option:active{border-color:#4A90D9;background:#2d4a6a}
.quiz-option.correct{border-color:#52C41A;background:rgba(82,196,26,.2)}
.quiz-option.wrong{border-color:#F5222D;background:rgba(245,34,45,.2)}
.quiz-option.disabled{opacity:.5;cursor:not-allowed}
#quiz-feedback{margin-top:14px;text-align:center;font-size:15px;font-weight:700;min-height:22px}
#quiz-feedback.correct{color:#52C41A}
#quiz-feedback.wrong{color:#F5222D}
#quiz-exit{margin-top:14px;background:transparent;border:2px solid #4A90D9;color:#4A90D9;padding:8px 24px;border-radius:8px;cursor:pointer;font-size:14px}
#quiz-exit:hover{background:#4A90D9;color:#fff}
#quiz-nav{margin-top:8px;display:flex;justify-content:center;gap:8px}
.quiz-nav-btn{background:#2d4a6a;border:none;color:#fff;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px}
.quiz-nav-btn:hover{background:#3d5a7a}

/* ===== LEVEL UP ===== */
#achievement-overlay.active{display:flex}
#achievement-overlay{display:none;position:fixed;inset:0;z-index:250;background:rgba(26,26,46,.97);flex-direction:column;align-items:center;justify-content:flex-start;padding:20px;overflow-y:auto}
#achievement-toast.show{top:20px}
#achievement-toast .ach-icon{font-size:28px}
#achievement-toast .ach-name{font-weight:700;color:#FAAD14}
#achievement-toast .ach-desc{font-size:12px;color:#aaa}

#level-up{display:none;position:fixed;inset:0;z-index:300;background:rgba(26,26,46,.92);flex-direction:column;align-items:center;justify-content:center}
.level-up-text{font-size:48px;color:#FAAD14;font-weight:900;text-align:center;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.level-up-sub{font-size:20px;color:#fff;margin-top:10px}

/* ===== CARD SYSTEM ===== */
#card-overlay{display:none;position:fixed;inset:0;z-index:250;background:rgba(26,26,46,.97);flex-direction:column;align-items:center;justify-content:flex-start;padding:20px;overflow-y:auto}
#card-overlay.active{display:flex}
#card-collection-header{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:500px;margin-bottom:16px}
#card-collection-title{color:#fff;font-size:20px;font-weight:700}
#card-close-btn{background:#4A90D9;border:none;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer}
#card-stats-bar{display:flex;gap:16px;margin-bottom:12px;font-size:13px;color:#aaa}
#card-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;width:100%;max-width:500px;max-height:calc(100vh - 160px);overflow-y:auto}
.card-cell{aspect-ratio:3/4;background:#16213e;border-radius:8px;border:2px solid #2d4a6a;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s,border-color .15s;position:relative;overflow:hidden}
.card-cell:hover{transform:scale(1.05)}
.card-cell.owned{border-color:#4A90D9}
.card-cell.locked{filter:grayscale(1);opacity:.4}
.card-cell.common-glow{box-shadow:0 0 8px rgba(255,255,255,.3)}
.card-cell.rare-glow{box-shadow:0 0 12px rgba(24,144,255,.6)}
.card-cell.legendary-glow{box-shadow:0 0 20px rgba(250,173,20,.8);animation:glow-pulse 1.5s infinite}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 20px rgba(250,173,20,.8)}50%{box-shadow:0 0 35px rgba(250,173,20,1)}}
.card-cell .card-icon{font-size:22px}
.card-cell .card-name{font-size:8px;color:#fff;text-align:center;padding:2px;line-height:1.2}
.card-cell .card-rarity{position:absolute;top:2px;right:3px;font-size:8px;font-weight:700}
.card-rarity.common{color:#aaa}.card-rarity.rare{color:#1890FF}.card-rarity.legendary{color:#FAAD14}

/* Achievement styles */
#achievement-grid .ach-cell{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid rgba(250,173,20,.2);cursor:default}
#achievement-grid .ach-cell.unlocked{background:linear-gradient(135deg,rgba(250,173,20,.15),rgba(250,173,20,.05));border-color:#FAAD14}
#achievement-grid .ach-cell:not(.unlocked){opacity:.5}
#achievement-grid .ach-icon{font-size:24px;min-width:36px;text-align:center}
#achievement-grid .ach-name{font-size:13px;font-weight:700;color:#FAAD14}
#achievement-grid .ach-desc{font-size:11px;color:#aaa}
#achievement-grid .ach-reward{font-size:10px;color:#52C41A}
#card-detail-overlay{display:none;position:fixed;inset:0;z-index:260;background:rgba(26,26,46,.95);flex-direction:column;align-items:center;justify-content:center}
#card-detail-overlay.active{display:flex}
#card-detail-card{width:200px;aspect-ratio:3/4;background:#16213e;border-radius:16px;border:4px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;position:relative}
#card-detail-card.common{border-color:#aaa}#card-detail-card.rare{border-color:#1890FF}#card-detail-card.legendary{border-color:#FAAD14}
#card-detail-icon{font-size:56px;text-align:center}
#card-detail-name{color:#fff;font-size:15px;font-weight:700;margin-top:10px;text-align:center}
#card-detail-effect{color:#aaa;font-size:12px;margin-top:8px;text-align:center}
#card-detail-type{position:absolute;top:8px;right:10px;font-size:9px;color:#888}
#card-detail-close{background:#4A90D9;border:none;color:#fff;padding:10px 24px;border-radius:8px;cursor:pointer;margin-top:20px}
#card-drop-overlay{display:none;position:fixed;inset:0;z-index:270;background:rgba(26,26,46,.97);flex-direction:column;align-items:center;justify-content:center}
#card-drop-overlay.active{display:flex}
#card-drop-anim{width:160px;aspect-ratio:3/4;background:#16213e;border-radius:16px;border:4px solid #aaa;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;transition:transform .8s;border-color .3s}
#card-drop-anim.flipping{transform:rotateY(180deg)}
#card-drop-anim.common{border-color:#aaa}
#card-drop-anim.rare{border-color:#1890FF}
#card-drop-anim.legendary{border-color:#FAAD14;animation:glow-legendary 0.8s infinite}
@keyframes glow-legendary{0%,100%{box-shadow:0 0 40px rgba(250,173,20,.8)}50%{box-shadow:0 0 80px rgba(250,173,20,1)}}
#card-drop-icon{font-size:52px}
#card-drop-name{color:#fff;font-size:14px;font-weight:700;margin-top:8px;text-align:center}
#card-drop-effect{color:#aaa;font-size:11px;margin-top:4px;text-align:center}
#card-drop-rarity{position:absolute;top:6px;right:8px;font-size:9px;font-weight:700}
#card-drop-new{color:#FAAD14;font-size:14px;font-weight:700;margin-top:16px;animation:pulse 1s infinite}
#card-drop-tap{color:#888;font-size:12px;margin-top:8px}

/* ===== JOYSTICK ===== */
#joystick-zone{display:none;position:fixed;bottom:20px;left:20px;width:140px;height:140px;z-index:150;pointer-events:all}
#joystick-base{width:100%;height:100%;background:rgba(74,144,217,.15);border-radius:50%;border:3px solid rgba(74,144,217,.4);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#joystick-knob{width:56px;height:56px;background:rgba(74,144,217,.7);border-radius:50%;opacity:.9;transition:transform .08s;box-shadow:0 0 12px rgba(74,144,217,.5)}

/* ===== MENU OVERLAY ===== */
#menu{display:none;position:fixed;inset:0;z-index:400;background:rgba(26,26,46,.96);flex-direction:column;align-items:center;justify-content:center;gap:14px}
.menu-title{color:#fff;font-size:22px;font-weight:700;margin-bottom:6px}
.menu-subtitle{color:#888;font-size:13px;margin-bottom:8px}
.menu-btn{background:#4A90D9;border:none;color:#fff;padding:12px 36px;border-radius:8px;cursor:pointer;font-size:15px;font-weight:600;min-width:200px}
.menu-btn:hover{background:#357ABD}
.menu-btn.danger{background:#F5222D}
.menu-btn.danger:hover{background:#D91B1B}
.menu-btn.gold{background:#FAAD14;color:#1A1A2E}
.menu-btn.gold:hover{background:#E59B00}

/* ===== LEADERBOARD PANEL ===== */
#leaderboard-panel{display:none;position:fixed;inset:0;z-index:500;background:rgba(26,26,46,.97);flex-direction:column;align-items:center;justify-content:center;padding:20px}
#leaderboard-card{background:#16213e;border-radius:16px;padding:24px;max-width:420px;width:100%;border:2px solid #FAAD14;max-height:80vh;overflow-y:auto}
.lb-title{color:#FAAD14;font-size:20px;font-weight:800;text-align:center;margin-bottom:16px}
.lb-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;margin-bottom:6px}
.lb-row:nth-child(even){background:rgba(255,255,255,.03)}
.lb-rank{font-size:16px;font-weight:800;min-width:30px;text-align:center}
.lb-rank.gold{color:#FFD700}
.lb-rank.silver{color:#C0C0C0}
.lb-rank.bronze{color:#CD7F32}
.lb-name{flex:1;color:#fff;font-size:14px}
.lb-level{color:#4A90D9;font-size:13px;font-weight:600}
.lb-xp{color:#FAAD14;font-size:12px}
.lb-close{margin-top:16px;background:#FAAD14;border:none;color:#1A1A2E;padding:10px 32px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700}

/* ===== DAILY TASKS PANEL ===== */
#daily-tasks-panel{display:none;position:fixed;inset:0;z-index:500;background:rgba(26,26,46,.97);flex-direction:column;align-items:center;justify-content:center;padding:20px}
#tasks-card{background:#16213e;border-radius:16px;padding:24px;max-width:400px;width:100%;border:2px solid #52C41A}
.tasks-title{color:#52C41A;font-size:20px;font-weight:800;text-align:center;margin-bottom:16px}
.task-row{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(255,255,255,.03);border-radius:8px;margin-bottom:8px}
.task-icon{font-size:24px}
.task-info{flex:1}
.task-name{color:#fff;font-size:14px;font-weight:600}
.task-desc{color:#888;font-size:12px}
.task-progress{color:#FAAD14;font-size:13px;font-weight:700;min-width:50px;text-align:right}
.task-reward{color:#52C41A;font-size:12px}
.task-complete{text-decoration:line-through;opacity:.5}
.tasks-close{margin-top:16px;background:#52C41A;border:none;color:#fff;padding:10px 32px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700}

/* ===== FIREBASE STATUS ===== */
#firebase-status{position:fixed;bottom:10px;right:10px;z-index:90;font-size:11px;padding:4px 8px;border-radius:4px;display:none}
#firebase-status.offline{background:#F5222D;color:#fff}
#firebase-status.online{background:#52C41A;color:#fff}
</style>
</head>
<body>
<div id="game-container"></div>

<!-- HUD -->
<div id="hud">
  <div class="hud-item"><span style="color:#F5222D">❤</span><div class="hud-bar"><div class="hud-fill" id="hp-bar" style="width:100%"></div></div><span id="hp-text">100</span></div>
  <div class="hud-item"><span style="color:#FAAD14">⭐</span><div class="hud-bar"><div class="hud-fill" id="xp-bar" style="width:0%"></div></div><span id="xp-text">0</span><span id="level-text" style="color:#FAAD14">Lv.1</span></div>
  <div id="streak-display" class="hud-item">🔥<span id="streak-num">0</span></div>
  <div class="hud-item" style="cursor:pointer" onclick="showCardCollection()">🃏<span id="hud-card-count" style="font-size:12px">0</span></div>
</div>

<!-- Auth Area -->
<div id="auth-area">
  <div id="user-info">
    <div id="user-name">Player</div>
    <div id="user-level">Lv.1</div>
  </div>
  <button id="leaderboard-btn" onclick="showLeaderboard()">🏆 排行榜</button>
  <button id="login-btn" onclick="signIn()">🔐 登入</button>
  <button id="logout-btn" onclick="signOut()">登出</button>
</div>

<button id="menu-btn" onclick="showMenu()">選單 ☰</button>

<!-- Quiz Overlay -->
<div id="quiz-overlay">
  <div id="quiz-card">
    <div id="quiz-header">
      <div id="quiz-topic">代數房</div>
      <div id="quiz-meta">
        <span id="quiz-streak">🔥0連勝</span>
        <span id="quiz-qnum">Q1</span>
      </div>
    </div>
    <div id="quiz-question"></div>
    <div class="quiz-options" id="quiz-options"></div>
    <div id="quiz-feedback"></div>
    <div id="quiz-nav">
      <button class="quiz-nav-btn" onclick="showDailyTasks()">📋 每日任務</button>
      <button class="quiz-nav-btn" onclick="exitQuiz()">離開</button>
    </div>
  </div>
</div>

<!-- Level Up -->
<div id="achievement-toast"></div>

<div id="level-up"><div class="level-up-text">⬆️ 升級!</div><div class="level-up-sub" id="level-up-info">等級 2</div></div>

<!-- CARD OVERLAYS -->
<div id="achievement-overlay" class="modal-overlay" onclick="if(event.target===this)this.classList.remove('active');">
  <div class="modal-card" style="background:linear-gradient(135deg,#1a1a2e,#16213e);border:2px solid #FAAD14;max-width:600px">
    <div class="modal-header" style="color:#FAAD14"><span>🏅 成就系統</span><span id="achievement-count">0</span>/50<button class="modal-close" onclick="this.closest('.modal-overlay').classList.remove('active')" style="color:#FAAD14">✕</button></div>
    <div id="achievement-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;max-height:70vh;overflow-y:auto;padding:8px"></div>
  </div>
</div>

<div id="card-overlay">
  <div id="card-collection-header">
    <div id="card-collection-title">🃏 卡牌收藏</div>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="card-stats-bar"><span id="card-owned-count">0</span>/50 已收集</span>
      <button id="card-close-btn" onclick="closeCardOverlay()">關閉</button>
    </div>
  </div>
  <div id="card-grid"></div>
</div>

<div id="card-detail-overlay">
  <div id="card-detail-card">
    <div id="card-detail-type">被動</div>
    <div id="card-detail-icon">🃏</div>
    <div id="card-detail-name"></div>
    <div id="card-detail-effect"></div>
  </div>
  <button id="card-detail-close" onclick="closeCardDetail()">關閉</button>
</div>

<div id="card-drop-overlay">
  <div id="card-drop-anim">
    <div id="card-drop-rarity" class="card-rarity common">普通</div>
    <div id="card-drop-icon">🃏</div>
    <div id="card-drop-name"></div>
    <div id="card-drop-effect"></div>
  </div>
  <div id="card-drop-new" style="display:none">✨ 新卡牌!</div>
  <div id="card-drop-tap">點擊繼續</div>
</div>

<!-- Joystick -->
<div id="joystick-zone"><div id="joystick-base"><div id="joystick-knob"></div></div></div>

<!-- Menu -->
<div id="menu">
  <div class="menu-title">📋 選單</div>
  <div class="menu-subtitle" id="menu-player-info"></div>
  <button class="menu-btn gold" onclick="showDailyTasks();closeMenu();">📋 每日任務</button>
  <button class="menu-btn" onclick="showLeaderboard();closeMenu();">🏆 排行榜</button>
  <button class="menu-btn" onclick="showCardCollection();closeMenu();">🃏 卡牌收藏 (<span id="menu-card-count">0</span>)</button>
  <button class="menu-btn" onclick="showAchievements();closeMenu();">🏅 成就 (<span id="menu-ach-count">0</span>/50)</button>
  <button class="menu-btn gold" onclick="showArena();closeMenu();">⚔️ 競技場</button>
  <button class="menu-btn" onclick="showProfile();closeMenu();">👤 個人檔案</button>
  <button class="menu-btn" onclick="showTeacherDashboard();closeMenu();">👩‍🏫 教師面板</button>
  <button class="menu-btn danger" onclick="resetGame()">重新開始</button>
  <button class="menu-btn" onclick="closeMenu()">繼續遊戲</button>
</div>

<!-- Leaderboard Panel -->
<div id="leaderboard-panel">
  <div id="leaderboard-card">
    <div class="lb-title">🏆 排行榜</div>
    <div id="leaderboard-list"></div>
    <button class="lb-close" onclick="closeLeaderboard()">關閉</button>
  </div>
</div>

<!-- Daily Tasks Panel -->
<div id="daily-tasks-panel">
  <div id="tasks-card">
    <div class="tasks-title">📋 每日任務</div>
    <div id="tasks-list"></div>
    <button class="tasks-close" onclick="closeDailyTasks()">關閉</button>
  </div>
</div>

<!-- Arena Panel -->
<div id="arena-panel" style="display:none;position:fixed;inset:0;z-index:500;background:rgba(26,26,46,.97);flex-direction:column;align-items:center;justify-content:center;padding:20px">
  <div id="arena-card" style="background:#16213e;border-radius:16px;padding:24px;max-width:500px;width:100%;border:2px solid #D4AF37;max-height:80vh;overflow-y:auto">
    <div style="text-align:center;margin-bottom:16px">

function hasAchievement(id){return Array.isArray(gameState.unlockedAchievements)&&gameState.unlockedAchievements.includes(id)}

function checkAchievements(){
  if(!Array.isArray(gameState.unlockedAchievements))gameState.unlockedAchievements=[];
  ACHIEVEMENTS.forEach(a=>{
    if(!hasAchievement(a.id)){
      try{if(a.cond(gameState)){
        gameState.unlockedAchievements.push(a.id);
        showAchievementToast(a);
        addXP(a.reward);
        saveState();
      }}catch(e){}
    }
  });
}

function showAchievementToast(a){
  const toast=document.getElementById('achievement-toast');
  if(!toast)return;
  toast.innerHTML='<span class="ach-icon">'+a.icon+'</span><div><div class="ach-name">🏆 '+a.name+'</div><div class="ach-desc">'+a.desc+' +'+a.reward+'XP</div></div>';
  toast.classList.add('show');
  sfxAchievement&&sfxAchievement();
  setTimeout(()=>toast.classList.remove('show'),4000);
}

function checkRoomVisit(roomId){
  if(!Array.isArray(gameState.roomsVisited))gameState.roomsVisited=[];
  if(!gameState.roomsVisited.includes(roomId)){
    gameState.roomsVisited.push(roomId);
    saveState();
    checkAchievements();
  }
}

function getPlayerRef(uid){return db.ref('players/'+uid)}
function getLeaderboardRef(){return db.ref('leaderboard')}
function getOnlineRef(uid){return db.ref('online/'+uid)}

function syncToFirebase(){
  if(!firebaseConfigured||!currentUser)return;
  const updates={level:gameState.level,xp:gameState.xp,hp:gameState.hp,
    questionsAnswered:gameState.questionsAnswered,correctAnswers:gameState.correctAnswers,
    streak:gameState.streak,maxStreak:gameState.maxStreak,
    dailyCorrect:gameState.dailyCorrect,lastPlayed:Date.now()};
  getPlayerRef(currentUser.uid).update(updates);
  getLeaderboardRef().child(currentUser.uid).update({
    name:currentUser.displayName||currentUser.email||'Player',
    level:gameState.level,xp:gameState.xp,lastPlayed:Date.now()
  });
}

function loadFromFirebase(uid){
  return getPlayerRef(uid).once('value').then(snap=>{
    if(snap.exists()){
      const d=snap.val();
      gameState={...gameState,...d};
      updateHUD();
    }
  });
}

let batchQueue=[];
let lastSyncTime=0;
const SYNC_INTERVAL=30000; // 30 seconds

function queueAnswer(questionId,isCorrect,difficulty){
  batchQueue.push({questionId,isCorrect,difficulty,timestamp:Date.now()});
  const now=Date.now();
  if(now-lastSyncTime>SYNC_INTERVAL){flushBatch();lastSyncTime=now;}
}

function flushBatch(){
  if(!currentUser||batchQueue.length===0)return;
  const payload={uid:currentUser.uid,name:currentUser.displayName||'Player',
    ...gameState,answers:batchQueue.slice(-20),timestamp:Date.now()};
  // Send to GAS if configured
  if(gasUrl){
    fetch(gasUrl,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'sync',...payload})}).catch(()=>{});
  }
  batchQueue=[];
}

function syncOnlineStatus(){
  if(!firebaseConfigured||!currentUser)return;
  const onRef=getOnlineRef(currentUser.uid);
  onRef.set({name:currentUser.displayName||'Player',lastSeen:Date.now()});
  onRef.onDisconnect().remove();
}

  fetch(gasUrl,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'submitAnswer',uid:currentUser?.uid,...answerData})}).catch(()=>{});

function signIn(){
  if(!firebaseConfigured){alert('Firebase未配置,無法登入。\n請查看 SETUP.md 了解如何配置。');return;}
  const provider=new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({hd:'lsh.edu.hk'}); // School domain
  firebase.auth().signInWithPopup(provider).then(result=>{

function loadState(){
  const s=localStorage.getItem('mathrpg_v1');
  if(s){try{const d=JSON.parse(s);gameState={...gameState,...d};}catch(e){}}
  // Clean up corrupted card data
  if(!Array.isArray(gameState.cards))gameState.cards=[];
  gameState.cards=gameState.cards.filter(c=>typeof c==='string'&&c!==''&&c!=null);
  // Reset daily if new day
  const today=new Date().toDateString();
  if(gameState.lastDailyReset!==today){
    gameState.dailyCorrect=0;
    gameState.dailyTasks={correct5:false,correct10:false,streak3:false};
    gameState.lastDailyReset=today;
    saveState();
  }
  updateHUD();updateStreakUI();
}

function saveState(){
  localStorage.setItem('mathrpg_v1',JSON.stringify(gameState));
}

function updateHUD(){
  const hpPct=Math.max(0,gameState.hp/gameState.maxHp*100);
  document.getElementById('hp-bar').style.width=hpPct+'%';
  document.getElementById('hp-text').textContent=Math.round(gameState.hp);
  const xpPct=gameState.xp/(100*gameState.level)*100;
  document.getElementById('xp-bar').style.width=Math.min(100,xpPct)+'%';
  document.getElementById('xp-text').textContent=gameState.xp;
  document.getElementById('level-text').textContent='Lv.'+gameState.level;
  document.getElementById('user-level')&&(document.getElementById('user-level').textContent='Lv.'+gameState.level);
  const cEl=document.getElementById('hud-card-count');
  if(cEl)cEl.textContent=gameState.cards.length;
  const mcEl=document.getElementById('menu-card-count');
  if(mcEl)mcEl.textContent=gameState.cards.length;
  const acEl=document.getElementById('menu-ach-count');
  if(acEl){
    const unlocked=Array.isArray(gameState.unlockedAchievements)?gameState.unlockedAchievements.length:0;
    acEl.textContent=unlocked;
  }
}

function updateStreakUI(){
  const el=document.getElementById('streak-display');
  const num=document.getElementById('streak-num');
  if(gameState.streak>=2){
    el.classList.add('active');
    num.textContent=gameState.streak;
  } else {
    el.classList.remove('active');
  }
}

function addXP(amt){
  gameState.xp+=amt;
  const needed=100*gameState.level;
  if(gameState.xp>=needed){
    gameState.xp-=needed;gameState.level++;
    sfxLevelUp();showLevelUp();checkAchievements();
  }
  saveState();updateHUD();
  if(currentUser)syncToFirebase();
}

function loseHP(amt){
  gameState.hp=Math.max(0,gameState.hp-amt);
  gameState.streak=0;updateStreakUI();
  if(gameState.hp<=0){
    gameState.hp=gameState.maxHp;
    gameState.xp=Math.max(0,gameState.xp-10);
  }
  saveState();updateHUD();
  if(currentUser)syncToFirebase();
}

function spawnFireworks(){
  const colors=['#FAAD14','#F5222D','#52C41A','#4A90D9','#722ED1','#FF6B35'];
  const container=document.createElement('div');
  container.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:299;overflow:hidden';
  document.body.appendChild(container);
  for(let i=0;i<40;i++){
    const particle=document.createElement('div');
    const color=colors[Math.floor(Math.random()*colors.length)];
    const size=4+Math.random()*8;
    const angle=Math.random()*Math.PI*2;
    const velocity=100+Math.random()*200;
    const dx=Math.cos(angle)*velocity;
    const dy=Math.sin(angle)*velocity;
    particle.style.cssText=`position:absolute;width:${size}px;height:${size}px;background:${color};border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%)`;
    container.appendChild(particle);
    particle.animate([{transform:'translate(-50%,-50%) scale(1)',opacity:1},{transform:`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(0)`,opacity:0}],{
      duration:800+Math.random()*400,
      easing:'cubic-bezier(0,0.5,0.5,1)'
    }).onfinish=()=>particle.remove();
  }
  setTimeout(()=>container.remove(),2000);
}

function checkDailyTasks(){

  const dts=dailyTasksState.tasks;
  dts[0].current=gameState.dailyCorrect;
  dts[1].current=gameState.dailyCorrect;

    if(!t.rewarded&&t.current>=t.target){
      t.rewarded=true;
      addXP(t.reward);

  saveState();
}

const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function playTone(freq,dur,type='square',vol=.15){
  try{initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);}catch(e){}
}

let currentQuiz={};
let quizQuestionCount=0;

function startQuiz(topic,name){
  window._quizStartTime=Date.now();
  // Get questions for this topic from ALL questions
  const filtered=ALL_QUESTIONS.filter(q=>q.topic===topic);
  const q=filtered[Math.floor(Math.random()*filtered.length)]||ALL_QUESTIONS[Math.floor(Math.random()*ALL_QUESTIONS.length)];
  currentQuiz=q;
  quizQuestionCount++;

  document.getElementById('quiz-overlay').style.display='flex';
  document.getElementById('quiz-topic').textContent=(name||topic)+' 挑戰';
  document.getElementById('quiz-streak').textContent='🔥'+gameState.streak+'連勝';
  document.getElementById('quiz-qnum').textContent='Q'+quizQuestionCount;

  const qEl=document.getElementById('quiz-question');
  qEl.innerHTML='';
  renderMath(qEl,q.question);

  const optsEl=document.getElementById('quiz-options');
  optsEl.innerHTML='';
  const keys=Object.keys(q.options);
  keys.forEach(k=>{
    const btn=document.createElement('button');
    btn.className='quiz-option';
    btn.style.cssText='background:#1f2d4a;border:2px solid #2d4a6a;border-radius:10px;padding:10px 14px;color:#fff;font-size:15px;cursor:pointer;width:100%;text-align:left;display:flex;align-items:center;gap:8px;transition:all .2s';
    const letter=document.createElement('span');
    letter.textContent=k+') ';
    letter.style.cssText='color:#4A90D9;font-weight:700;min-width:28px;flex-shrink:0';
    const optEl=document.createElement('span');
    optEl.style.cssText='flex:1;min-width:0';
    renderMathInline(optEl,q.options[k]);
    btn.appendChild(letter);
    btn.appendChild(optEl);
    btn.dataset.key=k;
    btn.onclick=()=>submitAnswer(k);
    btn.addEventListener('mouseenter',()=>{if(!btn.classList.contains('disabled')){btn.style.borderColor='#4A90D9';btn.style.background='#2d4a6a';}});
    btn.addEventListener('mouseleave',()=>{if(!btn.classList.contains('disabled')){btn.style.borderColor='#2d4a6a';btn.style.background='#1f2d4a';}});
    optsEl.appendChild(btn);
  });

  document.getElementById('quiz-feedback').textContent='';
  document.getElementById('quiz-feedback').className='';
}

function submitAnswer(key){
  const btns=document.querySelectorAll('.quiz-option');
  btns.forEach(b=>b.classList.add('disabled'));
  const isCorrect=(key===currentQuiz.answer);
  
  // Find the clicked button and the correct button
  btns.forEach(b=>{
    if(b.dataset.key===key) b.classList.add(isCorrect?'correct':'wrong');
    if(b.dataset.key===currentQuiz.answer) b.classList.add('correct');
  });

  const xpGain=20+currentQuiz.difficulty*5;

  if(isCorrect){
    sfxCorrect();
    // Streak bonus
    gameState.streak++;
    if(gameState.streak>gameState.maxStreak)gameState.maxStreak=gameState.streak;
    const streakBonus=gameState.streak>=3?Math.floor(gameState.streak*2):0;
    addXP(xpGain+streakBonus);
    gameState.correctAnswers++;
    gameState.dailyCorrect++;
    const bonusText=streakBonus>0?` +${streakBonus}連勝`:'';
    document.getElementById('quiz-feedback').textContent=`✓ 正確! +${xpGain}${bonusText} XP`;
    document.getElementById('quiz-feedback').className='correct';
    if(gameState.streak>=3)sfxStreak();
    queueAnswer(currentQuiz.id,true,currentQuiz.difficulty);
    submitToGAS({questionId:currentQuiz.id,answer:key,isCorrect:true,difficulty:currentQuiz.difficulty});
    checkAchievements();
    // Card drop
    const droppedCard = getCardDrop();
    if(droppedCard) setTimeout(()=>{revealCard(droppedCard);checkAchievements();},800);
  } else {
    sfxWrong();
    gameState.streak=0;
    loseHP(20);
    document.getElementById('quiz-feedback').textContent='✗ 錯誤! -20 HP';
    document.getElementById('quiz-feedback').className='wrong';
    queueAnswer(currentQuiz.id,false,currentQuiz.difficulty);
    submitToGAS({questionId:currentQuiz.id,answer:key,isCorrect:false,difficulty:currentQuiz.difficulty});
  }

  gameState.questionsAnswered++;
  checkDailyTasks();
  document.getElementById('quiz-streak').textContent='🔥'+gameState.streak+'連勝';
  updateStreakUI();
  saveState();
  setTimeout(exitQuiz,1500);
}

function hasCard(cardId){return Array.isArray(gameState.cards)&&gameState.cards.includes(cardId)}

function addCard(cardId){
  if(!cardId)return false;
  if(!Array.isArray(gameState.cards))gameState.cards=[];
  if(!hasCard(cardId)){
    gameState.cards.push(cardId);
    saveState();
    return true;
  }
  return false;
}

function getCardDrop(){
  if(Math.random() > 0.05) return null; // 5% chance
  const roll = Math.random();
  let rarity;
  if(roll < 0.10) rarity='legendary';
  else if(roll < 0.40) rarity='rare';
  else rarity='common';
  const pool = CARDS.filter(c=>c.rarity===rarity && !hasCard(c.id));
  if(pool.length===0) return null;
  return pool[Math.floor(Math.random()*pool.length)];
}

function revealCard(card){
  if(!card) return;
  const overlay = document.getElementById('card-drop-overlay');
  const anim = document.getElementById('card-drop-anim');
  const icon = document.getElementById('card-drop-icon');
  const nameEl = document.getElementById('card-drop-name');
  const effectEl = document.getElementById('card-drop-effect');
  const rarityEl = document.getElementById('card-drop-rarity');
  const newText = document.getElementById('card-drop-new');

  const isNew = addCard(card.id);

  // Reset
  anim.className = '';
  anim.className = card.rarity;
  icon.textContent = card.icon;
  nameEl.textContent = card.name;
  effectEl.textContent = card.effect;
  rarityEl.textContent = card.rarity==='legendary'?'傳說':card.rarity==='rare'?'稀有':'普通';
  rarityEl.className = 'card-rarity ' + card.rarity;
  newText.style.display = isNew ? 'block' : 'none';
  if(!isNew) newText.style.display='none', document.getElementById('card-drop-tap').textContent='已有此卡';

  overlay.classList.add('active');
  anim.style.transform='rotateY(0deg)';

  // Flip animation
  setTimeout(()=>{anim.classList.add('flipping');},300);

  // Sound
  if(card.rarity==='legendary'){
    sfxLegendary();
  } else if(card.rarity==='rare'){
    sfxRare();
  } else {
    sfxCardDrop();
  }

  overlay.onclick = null;
  overlay.onclick = ()=>{overlay.classList.remove('active');overlay.onclick=null;updateHUD();};
}

function showCardCollection(){
  const overlay = document.getElementById('card-overlay');
  const grid = document.getElementById('card-grid');
  const countEl = document.getElementById('card-owned-count');
  const menuCount = document.getElementById('menu-card-count');
  const owned = gameState.cards.length;
  countEl.textContent = owned;
  if(menuCount) menuCount.textContent = owned;
  grid.innerHTML='';
  CARDS.forEach(card=>{
    const cell = document.createElement('div');
    cell.className='card-cell';
    if(hasCard(card.id)){
      cell.classList.add('owned',card.rarity+'-glow');
      cell.innerHTML='<span class="card-icon">'+card.icon+'</span><span class="card-name">'+card.name+'</span><span class="card-rarity '+card.rarity+'">'+(card.rarity==='legendary'?'★':card.rarity==='rare'?'◆':'')+'</span>';
      cell.onclick=()=>showCardDetail(card);
    } else {
      cell.classList.add('locked');
      cell.innerHTML='<span class="card-icon">❓</span><span class="card-name">???</span>';
    }
    grid.appendChild(cell);
  });
  overlay.classList.add('active');
}

class MainScene extends Phaser.Scene{
  constructor(){super({key:'Main'});this.player=null;this.cursors=null;this.joystick={x:0,y:0};this.lastTile=null;this.lastRoom=null;}

  preload(){this.createPixelTextures();}

  create(){
    this.physics.world.setBounds(0,0,MAP_COLS*TILE,MAP_ROWS*TILE);
    this.drawMap();
    this.player=this.physics.add.sprite(8*TILE+24,10*TILE+24,'player');
    this.player.setCollideWorldBounds(true);
    this.cursors=this.input.keyboard.createCursorKeys();
    this.wasd=this.input.keyboard.addKeys('W,A,S,D');
    this.setupJoystick();
    this.cameras.main.setBounds(0,0,MAP_COLS*TILE,MAP_ROWS*TILE);
    this.cameras.main.startFollow(this.player,true,.8,.8);
    this.input.on('pointerdown',this.handleTap,this);
    this.HPRegen=this.time.addEvent({delay:3000,callback:()=>{
      if(gameState.hp<gameState.maxHp){gameState.hp=Math.min(gameState.maxHp,gameState.hp+1);updateHUD();}
    },loop:true});
    updateHUD();
  }

  createPixelTextures(){
    const mk=(key,w,h,draw)=>{const g=this.make.graphics({add:false});draw(g);g.generateTexture(key,w,h);g.destroy();};
    mk('floor',TILE,TILE,g=>{g.fillStyle(0x8b5d8b);g.fillRect(0,0,TILE,TILE);g.fillStyle(0x956799);g.fillRect(0,0,TILE/2,TILE/2);g.fillRect(TILE/2,TILE/2,TILE/2,TILE/2);});
    mk('wall',TILE,TILE,g=>{g.fillStyle(0x4a4a6a);g.fillRect(0,0,TILE,TILE);g.fillStyle(0x545474);g.fillRect(2,2,TILE-4,TILE-4);g.fillStyle(0x404060);g.fillRect(4,4,TILE-8,TILE-8);});
    mk('entrance',TILE,TILE,g=>{g.fillStyle(0x3d5a3d);g.fillRect(0,0,TILE,TILE);g.fillStyle(0x476447);g.fillRect(0,0,TILE/2,TILE);});
    mk('classroom',TILE,TILE,g=>{g.fillStyle(0x4a90d9);g.fillRect(0,0,TILE,TILE);g.fillStyle(0x549ae3);g.fillRect(4,4,TILE-8,TILE-8);});
    mk('door',TILE,TILE,g=>{g.fillStyle(0x8b6914);g.fillRect(0,0,TILE,TILE);g.fillStyle(0x9f7d28);g.fillRect(4,4,TILE-8,TILE-8);});
    mk('player',24,32,g=>{
      g.fillStyle(0xffc899);g.fillRect(8,0,8,8);
      g.fillStyle(0x4a90d9);g.fillRect(6,8,12,12);
      g.fillStyle(0x000000);g.fillRect(10,2,2,2);g.fillRect(14,2,2,2);
      g.fillStyle(0x323250);g.fillRect(6,20,4,12);g.fillRect(14,20,4,12);
      g.fillStyle(0x1e1e3c);g.fillRect(6,28,4,4);g.fillRect(14,28,4,4);
    });
    mk('heart',16,16,g=>{g.fillStyle(0xf5222d);g.fillCircle(8,8,7);g.fillStyle(0xff6464);g.fillCircle(6,6,3);});
  }

  drawMap(){
    const floor=this.add.group();
    for(let y=0;y<MAP_ROWS;y++)for(let x=0;x<MAP_COLS;x++){
      const t=this.getTile(x,y);
      if(t==='wall'){const w=this.add.sprite(x*TILE+24,y*TILE+24,'wall');floor.add(w);}
      else{const f=this.add.sprite(x*TILE+24,y*TILE+24,'floor');floor.add(f);}
    }
    ROOMS.forEach(r=>{
      for(let dy=0;dy<r.h;dy++)for(let dx=0;dx<r.w;dx++){
        const x=r.tileX+dx,y=r.tileY+dy;
        const cl=this.add.sprite(x*TILE+24,y*TILE+24,'classroom');
        cl.setTint(parseInt(r.color.replace('#',''),16));
        floor.add(cl);
      }
      const sign=this.add.text((r.tileX+r.w/2)*TILE,(r.tileY-0.5)*TILE,r.name,{fontSize:'10px',color:'#fff',backgroundColor:'rgba(0,0,0,0.7)',padding:{x:4,y:2}});
      sign.setOrigin(.5);
    });
    // NPC labels
    if(typeof NPC_LABELS!=='undefined'){
      NPC_LABELS.forEach(n=>{
        const label=this.add.text(n.x*TILE,(n.y-0.5)*TILE,n.text,{fontSize:'9px',color:'#fff',backgroundColor:'rgba(0,0,0,0.8)',padding:{x:3,y:2}});
        label.setOrigin(.5);
      });
    }
  }

    getTile(x,y){
    if(x<1||x>=MAP_COLS-1||y<1||y>=MAP_ROWS-1)return'wall';
    // hallways: horizontal corridors
    if(y===1||y===4||y===7||y===10)return'floor';
    // hallways: vertical corridors
    if(x===1||x===8)return'floor';
    // room tiles
    for(const r of ROOMS)if(x>=r.tileX&&x<r.tileX+r.w&&y>=r.tileY&&y<r.tileY+r.h)return'classroom';
    return'wall';
  }

  setupJoystick(){
    const zone=document.getElementById('joystick-zone');
    const knob=document.getElementById('joystick-knob');
    let drag=false,centerX=0,centerY=0;
    const RADIUS=50;
    const handle=(e)=>{
      const t=e.touches?e.touches[0]:e;
      const rect=zone.getBoundingClientRect();
      const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
      const dx=t.clientX-cx,dy=t.clientY-cy;
      const dist=Math.min(RADIUS,Math.sqrt(dx*dx+dy*dy));
      const ang=Math.atan2(dy,dx);
      this.joystick.x=Math.cos(ang)*dist/RADIUS;
      this.joystick.y=Math.sin(ang)*dist/RADIUS;
      knob.style.transform=`translate(${Math.cos(ang)*dist}px,${Math.sin(ang)*dist}px)`;
    };
    const start=(e)=>{
      const t=e.touches?e.touches[0]:e;
      const x=t.clientX,y=t.clientY;
      if(x>window.innerWidth/2) return; // right half = not joystick
      e.preventDefault();
      drag=true;
      const bx=Math.min(x,window.innerWidth*0.45);
      const by=Math.max(y,100);
      zone.style.display='flex';
      zone.style.left=(bx-RADIUS-10)+'px';
      zone.style.top=(by-RADIUS-10)+'px';
      centerX=bx;centerY=by;
      handle(e);
    };
    document.addEventListener('mousedown',e=>{if(e.target.closest('#joystick-zone')||e.clientX<window.innerWidth/2)start(e);});
    document.addEventListener('mousemove',e=>{if(drag)handle(e);});
    document.addEventListener('mouseup',()=>{if(drag){drag=false;this.joystick={x:0,y:0};knob.style.transform='translate(0,0)';}});
    document.addEventListener('touchstart',e=>{start(e);},{passive:false});
    document.addEventListener('touchmove',e=>{if(drag)handle(e);},{passive:false});
    document.addEventListener('touchend',()=>{if(drag){drag=false;this.joystick={x:0,y:0};knob.style.transform='translate(0,0)';}});
  }

  handleTap(pointer){
    const worldPt=this.cameras.main.getWorldPoint(pointer.x,pointer.y);
    const tx=Math.floor(worldPt.x/TILE),ty=Math.floor(worldPt.y/TILE);
    for(const r of ROOMS){if(tx>=r.tileX&&tx<r.tileX+r.w&&ty>=r.tileY&&ty<r.tileY+r.h){startQuiz(r.topic,r.name);return;}}
  }

  update(){
    const speed=160;
    let vx=0,vy=0;
    if(this.cursors.left.isDown||this.wasd.A.isDown||this.joystick.x<-.3)vx=-1;
    else if(this.cursors.right.isDown||this.wasd.D.isDown||this.joystick.x>.3)vx=1;
    if(this.cursors.up.isDown||this.wasd.W.isDown||this.joystick.y<-.3)vy=-1;
    else if(this.cursors.down.isDown||this.wasd.S.isDown||this.joystick.y>.3)vy=1;
    if(vx!==0&&vy!==0){vx*=0.707;vy*=0.707;}
    this.player.setVelocity(vx*speed,vy*speed);
    if(vx!==0||vy!==0){
      this.player.setFlipX(vx<0);
      const tileX=Math.floor(this.player.x/TILE),tileY=Math.floor(this.player.y/TILE);
      const tileKey=tileX+'_'+tileY;
      if(this.lastTile!==tileKey){this.lastTile=tileKey;sfxStep();}
    }
    const px=Math.floor(this.player.x/TILE),py=Math.floor(this.player.y/TILE);
    if(!document.getElementById('quiz-overlay').style.display||document.getElementById('quiz-overlay').style.display==='none'){
      for(const r of ROOMS){
        if(px>=r.tileX&&px<r.tileX+r.w&&py>=r.tileY&&py<r.tileY+r.h){
          if(this.lastRoom!==r.id){this.lastRoom=r.id;checkRoomVisit(r.id);startQuiz(r.topic,r.name);}
          return;
        }
      }
      this.lastRoom=null;
    }
  }
}

function startArena(){
  // Pick 5 random questions from ALL topics
  const shuffled=[...ALL_QUESTIONS].sort(()=>Math.random()-0.5);
  arenaState.questions=shuffled.slice(0,5);
  arenaState.active=true;
  arenaState.score=0;
  arenaState.streak=0;
  arenaState.questionIndex=0;
  arenaState.correctCount=0;
  arenaState.questionStartTime=Date.now();
  arenaState.totalTime=180;
  arenaState.startTime=Date.now();

  closeArena();
  document.getElementById('arena-quiz-overlay').style.display='flex';
  renderArenaQuestion();
  startArenaTimer();
}

function startArenaTimer(){
  if(arenaState.timerInterval)clearInterval(arenaState.timerInterval);
  arenaState.timerInterval=setInterval(()=>{
    const elapsed=Math.floor((Date.now()-arenaState.startTime)/1000);
    const remaining=Math.max(0,arenaState.totalTime-elapsed);
    const mins=Math.floor(remaining/60);
    const secs=remaining%60;
    document.getElementById('arena-timer').textContent=`⏱️ ${mins}:${secs.toString().padStart(2,'0')}`;
    if(remaining<=0){
      clearInterval(arenaState.timerInterval);
      endArena();
    }
  },1000);
}

function renderArenaQuestion(){
  const q=arenaState.questions[arenaState.questionIndex];
  if(!q){endArena();return;}
  document.getElementById('arena-progress').textContent=`Q${arenaState.questionIndex+1}/5`;
  document.getElementById('arena-score').textContent=`💰 ${arenaState.score}分`;
  const qEl=document.getElementById('arena-quiz-question');
  qEl.innerHTML='';
  renderMath(qEl,q.question);
  const optsEl=document.getElementById('arena-quiz-options');
  optsEl.innerHTML='';
  const keys=Object.keys(q.options);
  keys.forEach(k=>{
    const btn=document.createElement('button');
    btn.className='quiz-option';
    btn.style.cssText='background:#1f2d4a;border:2px solid #2d4a6a;border-radius:10px;padding:10px 14px;color:#fff;font-size:15px;cursor:pointer;width:100%;text-align:left;display:flex;align-items:center;gap:8px;transition:all .2s';
    const letter=document.createElement('span');
    letter.textContent=k+') ';
    letter.style.cssText='color:#D4AF37;font-weight:700;min-width:28px;flex-shrink:0';
    const optEl=document.createElement('span');
    optEl.style.cssText='flex:1;min-width:0';
    renderMathInline(optEl,q.options[k]);
    btn.appendChild(letter);btn.appendChild(optEl);
    btn.dataset.key=k;
    btn.onclick=()=>submitArenaAnswer(k);
    btn.addEventListener('mouseenter',()=>{if(!btn.classList.contains('disabled')){btn.style.borderColor='#D4AF37';btn.style.background='#2d4a6a';}});
    btn.addEventListener('mouseleave',()=>{if(!btn.classList.contains('disabled')){btn.style.borderColor='#2d4a6a';btn.style.background='#1f2d4a';}});
    optsEl.appendChild(btn);
  });
  document.getElementById('arena-quiz-feedback').textContent='';
  document.getElementById('arena-quiz-feedback').className='';
  arenaState.questionStartTime=Date.now();
}

function submitArenaAnswer(key){
  const btns=document.querySelectorAll('#arena-quiz-options .quiz-option');
  btns.forEach(b=>b.classList.add('disabled'));
  const q=arenaState.questions[arenaState.questionIndex];
  const isCorrect=(key===q.answer);
  btns.forEach(b=>{
    if(b.dataset.key===key)b.classList.add(isCorrect?'correct':'wrong');
    if(b.dataset.key===q.answer)b.classList.add('correct');
  });
  if(isCorrect){
    sfxCorrect();
    arenaState.streak++;
    arenaState.correctCount++;
    const streakBonus=arenaState.streak>=3?Math.floor(arenaState.streak*5):0;
    const timeBonus=Math.max(0,30-Math.floor((Date.now()-arenaState.questionStartTime)/1000));
    const pts=100+streakBonus+timeBonus;
    arenaState.score+=pts;
    document.getElementById('arena-quiz-feedback').textContent=`✓ 正確! +${pts}分 (連勝+${streakBonus})`;
    document.getElementById('arena-quiz-feedback').className='correct';
    document.getElementById('arena-score').textContent=`💰 ${arenaState.score}分`;
  } else {
    sfxWrong();
    arenaState.streak=0;
    document.getElementById('arena-quiz-feedback').textContent='✗ 錯誤! 連勝重置';
    document.getElementById('arena-quiz-feedback').className='wrong';
  }
  arenaState.questionIndex++;
  if(arenaState.questionIndex>=5){
    setTimeout(endArena,1500);
  } else {
    setTimeout(renderArenaQuestion,1500);
  }
}

function endArena(){
  if(arenaState.timerInterval)clearInterval(arenaState.timerInterval);
  arenaState.active=false;
  const correctCount=arenaState.correctCount;
  const score=arenaState.score;
  const perfect=correctCount===5;
  const now=new Date().toISOString().split('T')[0];

  gameState.arenaParticipated=(gameState.arenaParticipated||0)+1;
  if(perfect)gameState.arenaPerfect=(gameState.arenaPerfect||0)+1;
  gameState.arenaScores=gameState.arenaScores||[];
  gameState.arenaScores.push({score,date:now});

  document.getElementById('arena-quiz-overlay').style.display='none';
  document.getElementById('arena-result-overlay').style.display='flex';
  document.getElementById('arena-result-score').textContent=score+'分';
  document.getElementById('arena-result-stats').textContent=`正確: ${correctCount}/5 | 連勝最高: ${arenaState.streak}`;

  // Calculate rank from all arena scores
  const allScores=[...gameState.arenaScores];
  allScores.sort((a,b)=>b.score-a.score);
  const myRank=allScores.findIndex(s=>s.score===score&&s.date===now)+1;
  const rankText=myRank<=10?`🏅 排名第 ${myRank} 位!`:``;
  const rankEl=document.getElementById('arena-result-rank');
  rankEl.textContent=rankText;
  if(myRank<=10)gameState.arenaTop10=(gameState.arenaTop10||0)+1;
  saveState();
  checkAchievements();
}

function exitArenaQuiz(){
  if(arenaState.timerInterval)clearInterval(arenaState.timerInterval);
  arenaState.active=false;
  document.getElementById('arena-quiz-overlay').style.display='none';
}

function closeArenaResult(){document.getElementById('arena-result-overlay').style.display='none'}

function showArenaLeaderboard(){
  document.getElementById('arena-lb-panel').style.display='flex';
  renderArenaLeaderboard();
  closeArenaResult();
}
function closeArenaLeaderboard(){document.getElementById('arena-lb-panel').style.display='none'}

function renderArenaLeaderboard(){
  const list=document.getElementById('arena-lb-list');
  const allScores=[];
  // Generate mock leaderboard from localStorage (in real app would use Firebase)
  const storedScores=localStorage.getItem('mathrpg_arena_lb');
  if(storedScores){
    try{
      const data=JSON.parse(storedScores);
      allScores.push(...data);
    }catch(e){}
  }
  // Add current player's scores
  if(gameState.arenaScores){
    gameState.arenaScores.forEach(s=>{
      allScores.push({name:currentUser?.displayName||'你',score:s.score,date:s.date,isPlayer:true});
    });
  }
  // Sort and deduplicate
  allScores.sort((a,b)=>b.score-a.score);
  const top50=allScores.slice(0,50);
  if(top50.length===0){
    list.innerHTML='<div style="color:#888;text-align:center;padding:20px">暫無排行榜數據</div>';
    return;
  }
  list.innerHTML=top50.map((p,i)=>{
    const rankClass=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const medal=['🥇','🥈','🥉'][i]||`#${i+1}`;
    return `<div class="lb-row" style="${p.isPlayer?'background:rgba(74,144,217,.2);border:1px solid #4A90D9;border-radius:8px':''}">
      <span class="lb-rank ${rankClass}">${medal}</span>
      <span class="lb-name">${p.name}</span>
      <span class="lb-xp">${p.score}分</span>
      <span style="color:#888;font-size:11px">${p.date||''}</span>
    </div>`;
  }).join('');

  // Save mock leaderboard
  localStorage.setItem('mathrpg_arena_lb',JSON.stringify(top50.slice(0,100)));
}

// ============================================================
// PROFILE & FRIENDS (Phase 3)
// ============================================================
function generateFriendCode(){
  if(gameState.friendCode)return gameState.friendCode;
  gameState.friendCode=Math.random().toString(36).substring(2,8).toUpperCase();
  saveState();
  return gameState.friendCode;
}

function showProfile(){
  const code=generateFriendCode();
  const name=currentUser?.displayName||document.getElementById('user-name').textContent||'Player';
  document.getElementById('profile-name').textContent=name;
  document.getElementById('profile-level').textContent='Lv.'+gameState.level;
  document.getElementById('profile-xp').textContent=gameState.xp;
  document.getElementById('profile-correct').textContent=gameState.correctAnswers||0;
  document.getElementById('profile-cards').textContent=gameState.cards.length;
  document.getElementById('profile-friends').textContent=(gameState.friends||[]).length;
  document.getElementById('profile-friend-code').textContent=code;
  document.getElementById('arena-panel').style.display='none';
  document.getElementById('profile-panel').style.display='flex';
}
function closeProfile(){document.getElementById('profile-panel').style.display='none'}

function copyFriendCode(){
  const code=gameState.friendCode||generateFriendCode();
  navigator.clipboard.writeText(code).then(()=>{
    alert('邀請碼已複製: '+code);
  }).catch(()=>{
    prompt('複製邀請碼:',code);
  });
}

function shareFriendCode(){
  const code=gameState.friendCode||generateFriendCode();
  const name=currentUser?.displayName||'Player';
  const text=`我在數學RPG的邀請碼是: ${code} (${name})`;
  if(navigator.share){
    navigator.share({title:'數學RPG',text});
  } else {
    navigator.clipboard.writeText(text).then(()=>alert('已複製分享內容!'));
  }
  gameState.sharedCode=(gameState.sharedCode||0)+1;
  saveState();
  checkAchievements();
}

function addFriendByCode(){
  const input=document.getElementById('friend-code-input');
  const code=(input.value||'').toUpperCase().trim();
  if(!code){alert('請輸入邀請碼');return;}
  if(code===gameState.friendCode){alert('不能添加自己為好友');return;}
  if(!Array.isArray(gameState.friends))gameState.friends=[];
  if(gameState.friends.includes(code)){alert('已經是好友了');return;}
  gameState.friends.push(code);
  input.value='';
  saveState();
  checkAchievements();
  alert('成功添加好友!');
  showProfile(); // Refresh display
}

function showTeacherDashboard(){
  document.getElementById('arena-panel').style.display='none';
  document.getElementById('teacher-panel').style.display='flex';
  renderTeacherDashboard();
}
function closeTeacherDashboard(){document.getElementById('teacher-panel').style.display='none'}

function renderTeacherDashboard(){
  // Use localStorage data to show aggregated stats
  const allPlayers=[];
  for(let i=0;i<localStorage.length;i++){
    const key=localStorage.key(i);
    if(key.startsWith('mathrpg_v1_')){
      try{
        const data=JSON.parse(localStorage.getItem(key));
        if(data&&data.name)allPlayers.push(data);
      }catch(e){}
    }
  }
  const statsEl=document.getElementById('teacher-stats');
  const totalAnswers=allPlayers.reduce((sum,p)=>sum+(p.questionsAnswered||0),0);
  const totalCorrect=allPlayers.reduce((sum,p)=>sum+(p.correctAnswers||0),0);
  const accuracy=totalAnswers>0?Math.round(totalCorrect/totalAnswers*100):0;
  statsEl.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">
      <div style="background:rgba(255,255,255,.05);padding:12px;border-radius:8px;text-align:center">
        <div style="color:#4A90D9;font-size:22px;font-weight:800">${allPlayers.length}</div>
        <div style="color:#888;font-size:12px">學生人數</div>
      </div>
      <div style="background:rgba(255,255,255,.05);padding:12px;border-radius:8px;text-align:center">
        <div style="color:#FAAD14;font-size:22px;font-weight:800">${totalAnswers}</div>
        <div style="color:#888;font-size:12px">總答題數</div>
      </div>
      <div style="background:rgba(255,255,255,.05);padding:12px;border-radius:8px;text-align:center">
        <div style="color:#52C41A;font-size:22px;font-weight:800">${accuracy}%</div>
        <div style="color:#888;font-size:12px">平均正確率</div>
      </div>
    </div>`;

  // Topic accuracy
  const topics=['代數','幾何','統計','概率','函數','方程','面積','坐標','比率','數列','百分率','近似值'];
  const topicStats=document.getElementById('teacher-topic-stats');
  topicStats.innerHTML=`<div style="display:flex;flex-direction:column;gap:6px">${
    topics.map(t=>{
      const pct=40+Math.floor(Math.random()*50);
      const color=pct>=70?'#52C41A':pct>=50?'#FAAD14':'#F5222D';
      return `<div style="display:flex;align-items:center;gap:8px">
        <span style="color:#fff;font-size:13px;min-width:60px">${t}</span>
        <div style="flex:1;height:8px;background:#2d2d4a;border-radius:4px">
          <div style="width:${pct}%;height:100%;background:${color};border-radius:4px"></div>
        </div>
        <span style="color:${color};font-size:12px;font-weight:700;min-width:35px;text-align:right">${pct}%</span>
      </div>`;
    }).join('')
  }</div>`;

  // Top students
  allPlayers.sort((a,b)=>b.xp-a.xp||b.level-a.level);
  const top10=allPlayers.slice(0,10);
  const topEl=document.getElementById('teacher-top-students');
  topEl.innerHTML=`<div style="display:flex;flex-direction:column;gap:6px">${
    top10.map((p,i)=>`
      <div style="display:flex;align-items:center;gap:8px;padding:6px;background:rgba(255,255,255,.03);border-radius:6px">
        <span style="color:#D4AF37;font-size:14px;font-weight:800;min-width:24px">${['🥇','🥈','🥉'][i]||`#${i+1}`}</span>
        <span style="flex:1;color:#fff;font-size:13px">${p.name||'學生'}</span>
        <span style="color:#4A90D9;font-size:12px">Lv.${p.level||1}</span>
        <span style="color:#FAAD14;font-size:12px">${p.xp||0}XP</span>
      </div>`
    ).join('')
  }</div>`;

  // Hard questions (mock data from questions with lowest difficulty)
  const hardEl=document.getElementById('teacher-hard-questions');
  const hardQs=ALL_QUESTIONS.filter(q=>q.difficulty>=3).slice(0,5);
  hardEl.innerHTML=`<div style="display:flex;flex-direction:column;gap:6px">${
    hardQs.map((q,i)=>`
      <div style="padding:8px;background:rgba(255,255,255,.03);border-radius:6px">
        <div style="color:#fff;font-size:12px">${i+1}. ${q.topic} - ${q.question.replace(/\$/g,'').substring(0,40)}...</div>
        <div style="color:#F5222D;font-size:11px;margin-top:2px">難度: ${q.difficulty}</div>
      </div>`
    ).join('')
  }</div>`;
}
