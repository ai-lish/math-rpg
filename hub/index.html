<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math RPG - 中央樞紐</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    #game-container {
      width: 800px;
      height: 480px;
      border: 2px solid #4A90D9;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(74, 144, 217, 0.3);
    }
    #joystick-zone {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
    }
    @media (max-width: 820px) {
      #game-container { width: 100vw; height: 60vh; border-radius: 0; border: none; }
    }
    @media (pointer: coarse) {
      #joystick-zone { display: block; }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="joystick-zone"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="../shared/shared-main.js"></script>
  <script src="hub-main.js"></script>
  <script>
    const game = new Phaser.Game({
      type: Phaser.AUTO,
      width: 800,
      height: 480,
      parent: 'game-container',
      backgroundColor: '#1a1a2e',
      physics: {
        default: 'arcade',
        arcade: { gravity: { y: 0 }, debug: false }
      },
      scene: [MapHubScene]
    });
  </script>
</body>
</html>
