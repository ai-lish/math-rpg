<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math RPG - 學校</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    .container {
      text-align: center;
      color: #fff;
      padding: 40px;
    }
    .coming-soon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 36px;
      color: #4A90D9;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      color: #888;
      margin-bottom: 30px;
    }
    .back-btn {
      background: #4A90D9;
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .back-btn:hover {
      background: #357abd;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="coming-soon">🏫</div>
    <h1>School Zone</h1>
    <p>即將在 Phase 2 開放</p>
    <button class="back-btn" onclick="window.location.href='../index.html'">返回 Hub</button>
  </div>
</body>
</html>
